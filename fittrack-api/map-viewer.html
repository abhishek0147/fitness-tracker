<!DOCTYPE html><html lang="en"><head>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#F97316">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitTrack – Route Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--pri:#F97316;--pri2:#FB923C;--bg:#060914;--s:rgba(255,255,255,0.04);--bd:rgba(249,115,22,0.18);--t:#e2e8f0;--mt:rgba(226,232,240,0.38);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--t);overflow-x:hidden;overflow-y:auto;}
nav{position:sticky;top:0;z-index:50;background:rgba(6,9,20,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;}
.back{display:flex;align-items:center;gap:7px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);color:var(--pri);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.nav-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 56px);}
.sidebar{background:var(--s);border-right:1px solid var(--bd);padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.sidebar::-webkit-scrollbar{width:3px;}.sidebar::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.3);border-radius:3px;}
.section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--pri);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.fl label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:rgba(249,115,22,0.6);margin-bottom:5px;}
.fl input,.fl textarea,.fl select{width:100%;padding:9px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(249,115,22,0.2);border-radius:9px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:12px;transition:all 0.3s;}
.fl input:focus,.fl textarea:focus,.fl select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(249,115,22,0.1);}
.fl textarea{min-height:90px;resize:vertical;font-family:monospace;font-size:11px;}
.fl input::placeholder,.fl textarea::placeholder{color:rgba(255,255,255,0.18);}
.btn-load{width:100%;padding:11px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn-load:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(249,115,22,0.4);}
.stats-box{background:rgba(249,115,22,0.05);border:1px solid rgba(249,115,22,0.14);border-radius:10px;padding:12px;}
.stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(249,115,22,0.08);font-size:12px;}
.stat-row:last-child{border-bottom:none;}
.stat-val{font-family:'Syne',sans-serif;font-weight:700;color:var(--pri);font-size:13px;}
.msg{padding:9px 12px;border-radius:8px;font-size:12px;display:none;}
.msg.ok{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.22);display:block;}
.msg.err{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.22);display:block;}
.info-box{background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);border-radius:9px;padding:11px;font-size:11px;color:rgba(56,189,248,0.8);line-height:1.6;}
.info-box code{background:rgba(56,189,248,0.1);padding:1px 5px;border-radius:3px;font-size:10px;}
#map{width:100%;height:100%;}
/* Mobile: stack sidebar on top of map */
@media(max-width:700px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:auto;}
  .sidebar{border-right:none;border-bottom:1px solid var(--bd);max-height:60vh;}
  #map{height:50vh;}
}
</style>
</head><body>
<div id="pt"></div>
<nav>
  <button class="back" onclick="go('/dashboard.html')">← Dashboard</button>
  <div class="nav-t">🗺️ Route Viewer</div>
</nav>
<div class="layout">
  <div class="sidebar">
    <div>
      <div class="section-title">Load Route</div>
      <div class="fl" style="margin-bottom:10px"><label>Activity Name</label><input type="text" id="actName" value="My Route" placeholder="Route name"/></div>
      <div class="fl" style="margin-bottom:10px"><label>GeoJSON Data</label><textarea id="geojsonInput" placeholder='Paste GeoJSON here...'></textarea></div>
      <button class="btn-load" onclick="loadRoute()">Load Route on Map</button>
      <div class="msg" id="msg" style="margin-top:8px"></div>
    </div>
    <div id="statsBox" style="display:none">
      <div class="section-title">Route Stats</div>
      <div class="stats-box">
        <div class="stat-row"><span>Points</span><span class="stat-val" id="stPts">—</span></div>
        <div class="stat-row"><span>Distance</span><span class="stat-val" id="stDist">—</span></div>
        <div class="stat-row"><span>Elevation gain</span><span class="stat-val" id="stElev">—</span></div>
        <div class="stat-row"><span>Max elevation</span><span class="stat-val" id="stMaxElev">—</span></div>
      </div>
    </div>
    <div class="info-box">
      <strong>How to use:</strong><br>
      1. Complete an activity in FitTrack<br>
      2. Get GeoJSON via <code>GET /api/routes/:id/geojson</code><br>
      3. Paste it above and click Load<br><br>
      Or paste any valid GeoJSON with a <code>LineString</code> feature.
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
function initT(){const t=document.getElementById('pt');if(!t)return;t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(1);transform-origin:right;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.6s cubic-bezier(0.22,1,0.36,1)';t.style.transform='scaleX(0)';}));}
window.addEventListener('pageshow',e=>{if(e.persisted)initT();});
function go(url){const t=document.getElementById('pt');if(!t){location.href=url;return;}t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(0);transform-origin:left;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.45s cubic-bezier(0.77,0,0.18,1)';t.style.transform='scaleX(1)';setTimeout(()=>location.href=url,460);}));}
initT();

const map = L.map('map').setView([20.5937,78.9629],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(map);
setTimeout(()=>map.invalidateSize(),200);
window.addEventListener('resize',()=>map.invalidateSize());

let routeLayer=null;

// Example GeoJSON preloaded
const example={type:'FeatureCollection',features:[
  {type:'Feature',geometry:{type:'LineString',coordinates:[[-74.006,40.7128,10],[-74.005,40.715,12],[-74.004,40.718,15],[-74.003,40.72,18],[-74.001,40.721,20],[-74.002,40.717,17],[-74.004,40.714,14],[-74.0055,40.712,11]]},properties:{points:8}},
  {type:'Feature',geometry:{type:'Point',coordinates:[-74.006,40.7128]},properties:{name:'Start',marker:'start'}},
  {type:'Feature',geometry:{type:'Point',coordinates:[-74.0055,40.712]},properties:{name:'Finish',marker:'finish'}}
]};
document.getElementById('geojsonInput').value=JSON.stringify(example,null,2);
setTimeout(()=>loadRoute(),400);

function calcDist(coords){
  let d=0;
  for(let i=1;i<coords.length;i++){
    const[lo1,la1]=coords[i-1],[lo2,la2]=coords[i];
    const R=6371,dL=((la2-la1)*Math.PI)/180,dl=((lo2-lo1)*Math.PI)/180;
    const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dl/2)**2;
    d+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }
  return d;
}

function loadRoute(){
  const raw=document.getElementById('geojsonInput').value.trim();
  const msgEl=document.getElementById('msg');
  msgEl.className='msg';
  if(!raw){msgEl.className='msg err';msgEl.textContent='❌ Please paste GeoJSON data';return;}

  let gj;
  try{gj=JSON.parse(raw);}catch(e){msgEl.className='msg err';msgEl.textContent='❌ Invalid JSON: '+e.message;return;}

  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}

  try{
    const lineFeature=gj.features?.find(f=>f.geometry?.type==='LineString')||
      (gj.type==='Feature'&&gj.geometry?.type==='LineString'?gj:null)||
      (gj.type==='LineString'?{geometry:gj}:null);

    if(!lineFeature){msgEl.className='msg err';msgEl.textContent='❌ No LineString found in GeoJSON';return;}

    const coords=lineFeature.geometry.coordinates;

    routeLayer=L.layerGroup().addTo(map);

    // Route line
    L.polyline(coords.map(c=>[c[1],c[0]]),{color:'#F97316',weight:4,opacity:0.9}).addTo(routeLayer);

    // Start/finish markers from features
    (gj.features||[]).forEach(f=>{
      if(f.geometry?.type==='Point'){
        const[lo,la]=f.geometry.coordinates;
        const isStart=f.properties?.marker==='start';
        L.circleMarker([la,lo],{radius:8,fillColor:isStart?'#22c55e':'#ef4444',color:'#fff',weight:2,fillOpacity:1})
          .bindTooltip(isStart?'Start':'Finish',{permanent:true,direction:'top'})
          .addTo(routeLayer);
      }
    });

    // Fit bounds
    const lls=coords.map(c=>[c[1],c[0]]);
    map.fitBounds(L.polyline(lls).getBounds(),{padding:[40,40]});

    // Stats
    const elevs=coords.map(c=>c[2]||0);
    const maxElev=Math.max(...elevs);
    let elevGain=0;
    for(let i=1;i<elevs.length;i++){const d=elevs[i]-elevs[i-1];if(d>0)elevGain+=d;}
    const dist=calcDist(coords);
    document.getElementById('stPts').textContent=coords.length;
    document.getElementById('stDist').textContent=dist.toFixed(2)+' km';
    document.getElementById('stElev').textContent=elevGain.toFixed(0)+' m';
    document.getElementById('stMaxElev').textContent=maxElev.toFixed(0)+' m';
    document.getElementById('statsBox').style.display='block';
    msgEl.className='msg ok';msgEl.textContent='✅ Route loaded — '+coords.length+' points';
  } catch(e){
    msgEl.className='msg err';msgEl.textContent='❌ Error loading route: '+e.message;
  }
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script>
</body></html>
