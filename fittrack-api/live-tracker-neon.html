<!DOCTYPE html><html lang="en"><head>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#F97316">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitTrack - Live GPS Tracking</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0e27,#16213e,#1a1a2e);min-height:100vh;color:#e0e0e0;overflow:auto;}
.top-nav{position:sticky;top:0;z-index:50;background:rgba(8,12,30,0.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(102,255,192,0.12);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;}
.back-btn{display:flex;align-items:center;gap:8px;background:rgba(102,255,192,0.08);border:1px solid rgba(102,255,192,0.2);color:#66ffc0;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.3s;-webkit-tap-highlight-color:transparent;}
.back-btn:hover{background:rgba(102,255,192,0.15);}
.nav-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;background:linear-gradient(135deg,#66ffc0,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.container{display:grid;grid-template-columns:360px minmax(0,1fr);gap:24px;min-height:calc(100vh - 56px);padding:24px;}
.sidebar{display:flex;flex-direction:column;gap:20px;background:rgba(255,255,255,0.04);border:1px solid rgba(102,255,192,0.15);border-radius:24px;padding:30px;max-height:calc(100vh - 104px);overflow-y:auto;}
.map-container{border-radius:24px;overflow:hidden;height:calc(100vh - 104px);min-height:400px;}
#map{width:100%;height:100%;}
h1{background:linear-gradient(135deg,#66ffc0,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:24px;font-weight:700;letter-spacing:1px;margin-bottom:20px;}
.form-group{margin-bottom:16px;}
label{display:block;font-weight:600;margin-bottom:8px;color:#66ffc0;font-size:13px;text-transform:uppercase;letter-spacing:1px;}
input,select{width:100%;padding:12px 15px;border:2px solid rgba(102,255,192,0.3);border-radius:8px;background:rgba(255,255,255,0.05);color:#e0e0e0;font-size:14px;font-family:inherit;}
input:focus,select:focus{outline:none;border-color:#66ffc0;box-shadow:0 0 20px rgba(102,255,192,0.4);}
.button-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0 12px;}
button{padding:12px 16px;border:2px solid;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;transition:all 0.3s;text-transform:uppercase;letter-spacing:0.5px;-webkit-tap-highlight-color:transparent;}
.btn-primary{background:linear-gradient(135deg,#66ffc0,#00ff88);color:#0a0e27;border-color:#66ffc0;grid-column:1/-1;box-shadow:0 0 20px rgba(102,255,192,0.3);}
.btn-primary:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 5px 30px rgba(102,255,192,0.6);}
.btn-primary:disabled{background:rgba(102,102,102,0.3);border-color:rgba(102,102,102,0.3);cursor:not-allowed;}
.btn-secondary{background:rgba(102,255,192,0.1);color:#66ffc0;border-color:#66ffc0;}
.btn-secondary:hover:not(:disabled){background:rgba(102,255,192,0.2);transform:translateY(-2px);}
.btn-secondary:disabled{opacity:0.3;cursor:not-allowed;}
.btn-danger{background:rgba(255,100,100,0.1);color:#ff6464;border-color:#ff6464;}
.btn-danger:hover:not(:disabled){background:rgba(255,100,100,0.2);transform:translateY(-2px);}
.stats-box{background:linear-gradient(135deg,rgba(102,255,200,0.1),rgba(255,0,110,0.05));padding:20px;border-radius:12px;margin-bottom:16px;border:2px solid rgba(102,255,192,0.2);}
.stats-box h3,.history-box h3{margin-bottom:12px;font-size:14px;color:#66ffc0;text-transform:uppercase;letter-spacing:1px;}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(102,255,192,0.1);font-size:13px;color:#66ffc0;}
.stat-row:last-child{border-bottom:none;}
.stat-value{font-weight:700;font-size:15px;background:linear-gradient(135deg,#66ffc0,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.status{background:rgba(102,255,192,0.1);padding:12px 15px;border-left:4px solid #66ffc0;border-radius:6px;margin-bottom:16px;font-size:13px;color:#66ffc0;}
.status.tracking{border-left-color:#00ff88;background:rgba(0,255,136,0.1);color:#00ff88;}
.status.error{border-left-color:#ff6464;background:rgba(255,100,100,0.1);color:#ff6464;}
.tracking-indicator{display:inline-block;width:12px;height:12px;background:#00ff88;border-radius:50%;margin-right:8px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.2);}}
.history-box{background:rgba(102,255,200,0.05);padding:16px;border-radius:12px;border:1px solid rgba(102,255,192,0.12);}
.history-item{padding:12px;margin-bottom:10px;border-radius:12px;background:rgba(10,20,40,0.8);border:1px solid rgba(102,255,192,0.12);}
.history-item strong{display:block;color:#e3fef4;margin-bottom:6px;font-size:13px;}
.history-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;color:#bfe8d4;font-size:12px;}
.history-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.history-actions{display:flex;gap:6px;}
.history-share,.history-delete{padding:5px 9px;border-radius:8px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.06);color:#d4f9ff;cursor:pointer;font-size:11px;-webkit-tap-highlight-color:transparent;}
.history-empty{color:#9bd4b8;font-size:13px;}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.history-clear{font-size:12px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,0.06);color:#e0f4de;border:1px solid rgba(255,255,255,0.12);cursor:pointer;}
@media(max-width:900px){.container{grid-template-columns:1fr;padding:16px;}.map-container{min-height:50vh;height:50vh;}}
</style>
</head><body>
<div class="top-nav">
  <button class="back-btn" onclick="goBack()">← Dashboard</button>
  <div class="nav-title">🏃 FitTrack Live</div>
</div>
<div class="container">
  <div class="sidebar">
    <h1>🏃 FitTrack Live</h1>
    <div id="statusDiv" class="status"><span class="tracking-indicator"></span>Ready to start. Click Begin Tracking!</div>
    <div class="form-group">
      <label for="activityTitle">Activity Title</label>
      <input type="text" id="activityTitle" placeholder="e.g., Morning Run"/>
    </div>
    <div class="form-group">
      <label for="activityType">Activity Type</label>
      <select id="activityType">
        <option value="">Select Activity Type</option>
        <option value="run">🏃 Run</option><option value="cycle">🚴 Cycle</option>
        <option value="walk">🚶 Walk</option><option value="hike">⛰️ Hike</option>
        <option value="swim">🏊 Swim</option><option value="workout">💪 Workout</option>
        <option value="other">🎯 Other</option>
      </select>
    </div>
    <div class="button-group">
      <button class="btn-primary" id="startBtn" onclick="startTracking()">Begin Tracking</button>
      <button class="btn-secondary" id="pauseBtn" onclick="togglePause()" disabled>Pause</button>
      <button class="btn-danger" id="stopBtn" onclick="stopTracking()" disabled>Stop</button>
    </div>
    <div id="statsBox" class="stats-box" style="display:none">
      <h3>📊 Live Stats</h3>
      <div class="stat-row"><span>Distance:</span><span class="stat-value" id="statDist">0.00 km</span></div>
      <div class="stat-row"><span>Duration:</span><span class="stat-value" id="statDur">00:00:00</span></div>
      <div class="stat-row"><span>Speed:</span><span class="stat-value" id="statSpeed">0.0 km/h</span></div>
      <div class="stat-row"><span>Points:</span><span class="stat-value" id="statPts">0</span></div>
      <div class="stat-row"><span>Elevation:</span><span class="stat-value" id="statElev">0 m</span></div>
    </div>
    <div class="history-box">
      <div class="history-header">
        <h3>📚 History</h3>
        <button class="history-clear" onclick="clearHistory()">Clear All</button>
      </div>
      <div id="historyList"><p class="history-empty">No activities yet.</p></div>
    </div>
  </div>
  <div class="map-container"><div id="map"></div></div>
</div>
<script>
function goBack(){location.href='/dashboard.html';}

const st={tracking:false,paused:false,pts:[],startTime:null,pausedMs:0,pauseStart:null,watchId:null,watchIdLow:null,lastHighAccTime:0,interval:null,polyline:null,marker:null,dist:0,elev:0,lastLoc:null};
let history=[];
try{history=JSON.parse(localStorage.getItem('fittrack_activity_history')||'[]');}catch(e){}

const map=L.map('map').setView([20.5937,78.9629],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
setTimeout(()=>map.invalidateSize(),200);

const curIcon=L.divIcon({html:'<div style="width:18px;height:18px;border-radius:50%;background:#66ffc0;border:3px solid #0a0e27;box-shadow:0 0 12px #66ffc0;"></div>',iconSize:[18,18],iconAnchor:[9,9],className:''});

function setStatus(msg,type=''){const d=document.getElementById('statusDiv');d.className='status'+(type?' '+type:'');d.innerHTML='<span class="tracking-indicator"></span>'+msg;}
function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function calcDist(a,b,c,d){const R=6371,dL=((c-a)*Math.PI)/180,dl=((d-b)*Math.PI)/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

function updateStats(){
  const el=Math.floor((Date.now()-st.startTime+st.pausedMs)/1000);
  document.getElementById('statDist').textContent=st.dist.toFixed(2)+' km';
  document.getElementById('statDur').textContent=fmt(el);
  document.getElementById('statSpeed').textContent=el>0?(st.dist/(el/3600)).toFixed(1)+' km/h':'0.0 km/h';
  document.getElementById('statPts').textContent=st.pts.length;
  document.getElementById('statElev').textContent=st.elev.toFixed(0)+' m';
}

function onLoc(pos,isHigh){
  const{latitude:lat,longitude:lon,altitude:alt,accuracy}=pos.coords;
  if(!isHigh&&Date.now()-st.lastHighAccTime<8000)return;
  if(isHigh)st.lastHighAccTime=Date.now();
  if(!st.tracking||st.paused)return;
  const pt={latitude:lat,longitude:lon,elevation:alt||0,timestamp:new Date().toISOString(),accuracy};
  if(st.lastLoc&&accuracy<500){
    const d=calcDist(st.lastLoc.latitude,st.lastLoc.longitude,lat,lon);
    if(d>0.002){st.dist+=d;if(alt&&st.lastLoc.elevation){const dz=alt-st.lastLoc.elevation;if(dz>0)st.elev+=dz;}}
  }
  st.pts.push(pt);st.lastLoc=pt;
  if(st.polyline)map.removeLayer(st.polyline);
  st.polyline=L.polyline(st.pts.map(p=>[p.latitude,p.longitude]),{color:'#66ffc0',weight:4,opacity:0.9}).addTo(map);
  if(st.marker)st.marker.setLatLng([lat,lon]);else st.marker=L.marker([lat,lon],{icon:curIcon}).addTo(map);
  if(st.pts.length>1)map.fitBounds(st.polyline.getBounds(),{padding:[40,40]});else map.setView([lat,lon],16);
}

function startWatchers(){
  st.watchId=navigator.geolocation.watchPosition(p=>onLoc(p,true),e=>setStatus('⚠️ GPS error: '+e.message,'error'),{enableHighAccuracy:true,maximumAge:0,timeout:15000});
  st.watchIdLow=navigator.geolocation.watchPosition(p=>onLoc(p,false),()=>{},{enableHighAccuracy:false,maximumAge:5000,timeout:30000});
}
function stopWatchers(){
  if(st.watchId!==null){navigator.geolocation.clearWatch(st.watchId);st.watchId=null;}
  if(st.watchIdLow!==null){navigator.geolocation.clearWatch(st.watchIdLow);st.watchIdLow=null;}
}

function startTracking(){
  if(!navigator.geolocation){setStatus('❌ Geolocation not supported','error');return;}
  const title=document.getElementById('activityTitle').value.trim();
  const type=document.getElementById('activityType').value;
  if(!title||!type){setStatus('❌ Please fill in title and type','error');return;}
  Object.assign(st,{tracking:true,paused:false,pts:[],dist:0,elev:0,lastLoc:null,startTime:Date.now(),pausedMs:0,lastHighAccTime:0});
  document.getElementById('startBtn').disabled=true;
  document.getElementById('pauseBtn').disabled=false;
  document.getElementById('stopBtn').disabled=false;
  document.getElementById('activityTitle').disabled=true;
  document.getElementById('activityType').disabled=true;
  document.getElementById('statsBox').style.display='block';
  setStatus('🟢 GPS + Cell tower tracking active','tracking');
  startWatchers();
  st.interval=setInterval(updateStats,1000);
}

function togglePause(){
  const btn=document.getElementById('pauseBtn');
  if(!st.paused){
    stopWatchers();st.paused=true;st.pauseStart=Date.now();
    btn.textContent='Resume';setStatus('⏸ Paused');
  } else {
    st.pausedMs+=Date.now()-st.pauseStart;st.paused=false;
    btn.textContent='Pause';setStatus('🟢 Tracking resumed','tracking');
    startWatchers();
  }
}

function stopTracking(){
  stopWatchers();clearInterval(st.interval);st.tracking=false;
  if(st.pts.length<2){setStatus('❌ Need 2+ GPS points','error');resetUI();return;}
  const elapsed=Math.floor((Date.now()-st.startTime+st.pausedMs)/1000);
  const title=document.getElementById('activityTitle').value||'Activity';
  const type=document.getElementById('activityType').options[document.getElementById('activityType').selectedIndex].text;
  const entry={title,type,duration:fmt(elapsed),durationSecs:elapsed,distance:st.dist.toFixed(2),elevation:st.elev.toFixed(0),calories:Math.round(st.dist*60),gpsPoints:st.pts.slice(),savedAt:new Date().toISOString(),finishedAt:new Date().toLocaleString()};
  history.push(entry);
  localStorage.setItem('fittrack_activity_history',JSON.stringify(history));
  setStatus('✅ Activity saved!','tracking');
  renderHistory();resetUI();
}

function resetUI(){
  document.getElementById('startBtn').disabled=false;
  document.getElementById('pauseBtn').disabled=true;
  document.getElementById('pauseBtn').textContent='Pause';
  document.getElementById('stopBtn').disabled=false;
  document.getElementById('activityTitle').disabled=false;
  document.getElementById('activityTitle').value='';
  document.getElementById('activityType').disabled=false;
  document.getElementById('activityType').value='';
  document.getElementById('statsBox').style.display='none';
}

function renderHistory(){
  const list=document.getElementById('historyList');
  if(!history.length){list.innerHTML='<p class="history-empty">No activities yet.</p>';return;}
  list.innerHTML=history.slice().reverse().map((a,i)=>`
    <div class="history-item">
      <div class="history-top">
        <strong>${a.title}</strong>
        <div class="history-actions">
          <button class="history-delete" onclick="deleteHistory(${history.length-1-i})">🗑 Delete</button>
        </div>
      </div>
      <div class="history-meta">
        <span>⏱ ${a.duration}</span><span>📍 ${a.distance} km</span>
        <span>⛰ ${a.elevation} m</span><span>🔥 ${a.calories||'—'} kcal</span>
      </div>
      <div style="font-size:11px;color:#9bd4b8;margin-top:4px">${a.finishedAt||''}</div>
    </div>`).join('');
}

function deleteHistory(idx){
  if(!confirm('Delete this activity?'))return;
  history.splice(idx,1);
  localStorage.setItem('fittrack_activity_history',JSON.stringify(history));
  renderHistory();
}

function clearHistory(){
  if(!history.length||!confirm('Clear all activities?'))return;
  history=[];localStorage.setItem('fittrack_activity_history','[]');renderHistory();
}

renderHistory();

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script>
</body></html>
