<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack - Live GPS Tracking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            opacity: 0.5;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
            height: 100vh;
        }

        .sidebar {
            background: linear-gradient(180deg, rgba(30, 30, 50, 0.95) 0%, rgba(25, 35, 60, 0.95) 100%);
            padding: 30px;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(102, 255, 200, 0.1), inset 0 0 20px rgba(102, 255, 200, 0.05);
            border-right: 2px solid rgba(102, 255, 200, 0.2);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .map-container {
            position: relative;
            background: linear-gradient(135deg, #1a1a3a 0%, #16213e 100%);
        }

        #map { width: 100%; height: 100%; }

        h1 {
            background: linear-gradient(135deg, #66ffc0 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(102, 255, 192, 0.5); }
            50% { text-shadow: 0 0 20px rgba(102, 255, 192, 0.8), 0 0 30px rgba(102, 255, 192, 0.5); }
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #66ffc0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(102, 255, 192, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #66ffc0;
            background: rgba(102, 255, 192, 0.1);
            box-shadow: 0 0 20px rgba(102, 255, 192, 0.4), inset 0 0 10px rgba(102, 255, 192, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 25px 0 15px;
        }

        button {
            padding: 12px 16px;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #66ffc0 0%, #00ff88 100%);
            color: #0a0e27;
            border-color: #66ffc0;
            grid-column: 1 / -1;
            box-shadow: 0 0 20px rgba(102, 255, 192, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 30px rgba(102, 255, 192, 0.6), 0 0 40px rgba(102, 255, 192, 0.4);
        }

        .btn-primary:disabled {
            background: rgba(102, 102, 102, 0.3);
            border-color: rgba(102, 102, 102, 0.3);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(102, 255, 192, 0.1);
            color: #66ffc0;
            border-color: #66ffc0;
            box-shadow: 0 0 15px rgba(102, 255, 192, 0.2);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(102, 255, 192, 0.2);
            box-shadow: 0 0 25px rgba(102, 255, 192, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #ff006e 0%, #ff4081 100%);
            color: white;
            border-color: #ff006e;
            grid-column: 1 / -1;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 30px rgba(255, 0, 110, 0.6), 0 0 40px rgba(255, 0, 110, 0.4);
        }

        .btn-danger {
            background: rgba(255, 100, 100, 0.1);
            color: #ff6464;
            border-color: #ff6464;
            box-shadow: 0 0 15px rgba(255, 100, 100, 0.2);
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(255, 100, 100, 0.2);
            box-shadow: 0 0 25px rgba(255, 100, 100, 0.5);
            transform: translateY(-2px);
        }

        .stats-box {
            background: linear-gradient(135deg, rgba(102, 255, 200, 0.1) 0%, rgba(255, 0, 110, 0.05) 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid rgba(102, 255, 192, 0.2);
            box-shadow: 0 0 30px rgba(102, 255, 192, 0.15);
        }

        .stats-box h3 {
            margin-bottom: 15px;
            font-size: 16px;
            color: #66ffc0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(102, 255, 192, 0.1);
            font-size: 14px;
            color: #66ffc0;
        }

        .stat-row:last-child { border-bottom: none; }

        .stat-value {
            font-weight: 700;
            font-size: 16px;
            background: linear-gradient(135deg, #66ffc0 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status {
            background: rgba(102, 255, 192, 0.1);
            padding: 12px 15px;
            border-left: 4px solid #66ffc0;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #66ffc0;
            box-shadow: 0 0 15px rgba(102, 255, 192, 0.2);
        }

        .status.tracking {
            border-left-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .status.error {
            border-left-color: #ff6464;
            background: rgba(255, 100, 100, 0.1);
            color: #ff6464;
        }

        .status.success {
            border-left-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
        }

        .tracking-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 10px #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(102, 255, 192, 0.1);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(102, 255, 192, 0.3);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="stars-bg" id="starsBg"></div>
    <div class="container">
        <div class="sidebar">
            <h1>🏃 FitTrack Live</h1>
            <div id="status" class="status">
                <span class="tracking-indicator"></span>
                Ready to start. Click Begin Tracking!
            </div>
            <form id="activityForm">
                <div class="form-group">
                    <label for="activityTitle">Activity Title</label>
                    <input type="text" id="activityTitle" placeholder="e.g., Morning Run" required />
                </div>
                <div class="form-group">
                    <label for="activityType">Activity Type</label>
                    <select id="activityType" required>
                        <option value="">Select Activity Type</option>
                        <option value="run">🏃 Run</option>
                        <option value="cycle">🚴 Cycle</option>
                        <option value="walk">🚶 Walk</option>
                        <option value="hike">⛰️ Hike</option>
                        <option value="swim">🏊 Swim</option>
                        <option value="workout">💪 Workout</option>
                        <option value="other">🎯 Other</option>
                    </select>
                </div>
                <div class="button-group">
                    <button type="button" id="startBtn" class="btn-primary">Begin Tracking</button>
                    <button type="button" id="pauseBtn" class="btn-secondary" disabled>Pause</button>
                    <button type="button" id="stopBtn" class="btn-danger" disabled>Stop</button>
                </div>
                <button type="submit" id="saveBtn" class="btn-success" disabled>💾 Save to API</button>
            </form>
            <div id="stats" class="stats-box" style="display: none;">
                <h3>📊 Live Stats</h3>
                <div class="stat-row">
                    <span>Distance:</span>
                    <span class="stat-value" id="distance">0.00 km</span>
                </div>
                <div class="stat-row">
                    <span>Duration:</span>
                    <span class="stat-value" id="duration">00:00:00</span>
                </div>
                <div class="stat-row">
                    <span>Points:</span>
                    <span class="stat-value" id="pointCount">0</span>
                </div>
                <div class="stat-row">
                    <span>Speed:</span>
                    <span class="stat-value" id="speed">0.0 km/h</span>
                </div>
                <div class="stat-row">
                    <span>Elevation:</span>
                    <span class="stat-value" id="elevation">0 m</span>
                </div>
            </div>
        </div>
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>
    <script>
        function generateStars() {
            const bg = document.getElementById('starsBg');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                bg.appendChild(star);
            }
        }
        generateStars();

        const state = {
            tracking: false,
            paused: false,
            gpsPoints: [],
            startTime: null,
            pausedTime: 0,
            lastLocation: null,
            watchId: null,
            polyline: null,
            currentMarker: null,
            totalDistance: 0,
            totalElevation: 0,
            map: null,
        };

        let apiToken = localStorage.getItem('fittrack_token');

        function promptForToken() {
            const token = prompt('🔐 Paste your FitTrack API Token:\n\n(Get from login endpoint)');
            if (token && token.trim()) {
                localStorage.setItem('fittrack_token', token.trim());
                apiToken = token.trim();
                updateStatus('✅ Token saved!', 'success');
                return true;
            }
            return false;
        }

        if (!apiToken) promptForToken();

        state.map = L.map('map').setView([40.7128, -74.0060], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(state.map);

        const currentIcon = L.icon({
            iconUrl: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iOCIgZmlsbD0iIzY2ZmZjMCIgc3Ryb2tlPSIjMGEwZTI3IiBzdHJva2Utd2lkdGg9IjIiLz48Y2lyY2xlIGN4PSIxMiIgY3k9IjEyIiByPSI0IiBmaWxsPSIjMGEwZTI3Ii8+PC9zdmc+',
            iconSize: [24, 24],
            iconAnchor: [12, 12],
        });

        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const saveBtn = document.getElementById('saveBtn');
        const titleInput = document.getElementById('activityTitle');
        const typeSelect = document.getElementById('activityType');
        const statusDiv = document.getElementById('status');
        const statsBox = document.getElementById('stats');

        function updateStatus(message, type = 'info') {
            statusDiv.className = `status ${type}`;
            const indicator = '<span class="tracking-indicator"></span>';
            statusDiv.innerHTML = indicator + message;
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = ((lat2 - lat1) * Math.PI) / 180;
            const dLon = ((lon2 - lon1) * Math.PI) / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function updateStats() {
            const elapsed = Math.floor((Date.now() - state.startTime + state.pausedTime) / 1000);
            document.getElementById('duration').textContent = formatTime(elapsed);
            document.getElementById('distance').textContent = state.totalDistance.toFixed(2) + ' km';
            document.getElementById('pointCount').textContent = state.gpsPoints.length;
            document.getElementById('elevation').textContent = state.totalElevation.toFixed(0) + ' m';
            if (elapsed > 0) document.getElementById('speed').textContent = (state.totalDistance / (elapsed / 3600)).toFixed(1) + ' km/h';
        }

        startBtn.addEventListener('click', () => {
            if (!navigator.geolocation) { updateStatus('❌ Geolocation not supported', 'error'); return; }
            if (!apiToken) { updateStatus('❌ Enter token first', 'error'); if (promptForToken()) startBtn.click(); return; }
            if (!titleInput.value || !typeSelect.value) { updateStatus('❌ Fill all fields', 'error'); return; }

            state.tracking = true;
            state.paused = false;
            state.startTime = Date.now();
            state.gpsPoints = [];
            state.totalDistance = 0;
            state.totalElevation = 0;

            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            titleInput.disabled = true;
            typeSelect.disabled = true;
            statsBox.style.display = 'block';

            updateStatus('🟢 GPS tracking active...', 'tracking');

            state.watchId = navigator.geolocation.watchPosition(
                onLocationSuccess,
                onLocationError,
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );

            state.statsInterval = setInterval(updateStats, 1000);
        });

        pauseBtn.addEventListener('click', () => {
            state.paused = !state.paused;
            if (state.paused) {
                navigator.geolocation.clearWatch(state.watchId);
                pauseBtn.textContent = '▶ Resume';
                updateStatus('⏸️ Paused', 'info');
                state.pauseStartTime = Date.now();
            } else {
                state.pausedTime += Date.now() - state.pauseStartTime;
                pauseBtn.textContent = '⏸ Pause';
                updateStatus('🟢 Tracking resumed', 'tracking');
                state.watchId = navigator.geolocation.watchPosition(
                    onLocationSuccess,
                    onLocationError,
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                );
            }
        });

        stopBtn.addEventListener('click', () => {
            state.tracking = false;
            navigator.geolocation.clearWatch(state.watchId);
            clearInterval(state.statsInterval);

            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '⏸ Pause';
            stopBtn.disabled = true;
            titleInput.disabled = false;
            typeSelect.disabled = false;
            saveBtn.disabled = false;

            updateStatus('⏹️ Ready to save', 'success');
        });

        function onLocationSuccess(position) {
            const { latitude, longitude, altitude } = position.coords;
            const point = { latitude, longitude, elevation: altitude || 0, timestamp: new Date().toISOString() };

            if (state.lastLocation) {
                const dist = calculateDistance(state.lastLocation.latitude, state.lastLocation.longitude, latitude, longitude);
                state.totalDistance += dist;
                if (altitude && state.lastLocation.elevation) {
                    const elevChange = altitude - state.lastLocation.elevation;
                    if (elevChange > 0) state.totalElevation += elevChange;
                }
            }

            state.gpsPoints.push(point);
            state.lastLocation = point;

            const latlng = [latitude, longitude];
            if (state.polyline) state.map.removeLayer(state.polyline);
            const route = state.gpsPoints.map(p => [p.latitude, p.longitude]);
            state.polyline = L.polyline(route, { color: '#66ffc0', weight: 4, opacity: 0.9 }).addTo(state.map);

            if (state.currentMarker) {
                state.currentMarker.setLatLng(latlng);
            } else {
                state.currentMarker = L.marker(latlng, { icon: currentIcon }).addTo(state.map);
            }

            if (state.gpsPoints.length > 0) state.map.fitBounds(state.polyline.getBounds(), { padding: [50, 50] });
        }

        function onLocationError(error) {
            const messages = { 1: 'Permission denied', 2: 'Position unavailable', 3: 'Timeout' };
            updateStatus('⚠️ ' + (messages[error.code] || 'GPS error'), 'error');
        }

        document.getElementById('activityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (state.gpsPoints.length < 2) { updateStatus('❌ Need 2+ GPS points', 'error'); return; }
            saveBtn.disabled = true;

            try {
                const actRes = await fetch('http://localhost:3000/api/activities', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiToken}` },
                    body: JSON.stringify({
                        title: titleInput.value,
                        type: typeSelect.value,
                        duration: Math.floor((Date.now() - state.startTime + state.pausedTime) / 1000),
                        notes: `${state.gpsPoints.length} GPS points`,
                    }),
                });

                if (!actRes.ok) throw new Error('Activity creation failed');
                const actData = await actRes.json();
                const activityId = actData.activity.id;

                const gpsRes = await fetch(`http://localhost:3000/api/routes/${activityId}/record`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiToken}` },
                    body: JSON.stringify({ points: state.gpsPoints }),
                });

                if (!gpsRes.ok) throw new Error('GPS recording failed');

                updateStatus(`🎉 Saved! ID: ${activityId}`, 'success');

                setTimeout(() => {
                    titleInput.value = '';
                    typeSelect.value = '';
                    state.gpsPoints = [];
                    state.totalDistance = 0;
                    state.totalElevation = 0;
                    statsBox.style.display = 'none';
                    if (state.polyline) state.map.removeLayer(state.polyline);
                    if (state.currentMarker) state.map.removeLayer(state.currentMarker);
                    saveBtn.disabled = true;
                    updateStatus('✅ Ready for next activity', 'success');
                }, 3000);
            } catch (error) {
                updateStatus('❌ Error: ' + error.message, 'error');
                saveBtn.disabled = false;
            }
        });

        window.addEventListener('load', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    () => updateStatus('✅ GPS ready!', 'success'),
                    () => updateStatus('⚠️ Enable GPS in browser', 'info')
                );
            }
        });
    </script>
</body>
</html>
