<!DOCTYPE html><html lang="en"><head>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#F97316">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitTrack – Activity History</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--pri:#F97316;--pri2:#FB923C;--bg:#060914;--s:rgba(255,255,255,0.04);--bd:rgba(249,115,22,0.18);--t:#e2e8f0;--mt:rgba(226,232,240,0.38);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--t);overflow-x:hidden;overflow-y:auto;}
nav{position:sticky;top:0;z-index:50;background:rgba(6,9,20,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 20px;height:58px;display:flex;align-items:center;gap:12px;}
.back{display:flex;align-items:center;gap:7px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);color:var(--pri);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:600;transition:all 0.3s;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.nav-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1;}
.btn-clear{padding:6px 11px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#ef4444;border-radius:8px;font-size:12px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.page{max-width:760px;margin:0 auto;padding:20px 16px 80px;}
@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;animation:cardIn 0.5s 0.04s ease both;}
.sc{background:var(--s);border:1px solid var(--bd);border-radius:13px;padding:14px;text-align:center;}
.sc-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sc-l{font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.ai{background:var(--s);border:1px solid var(--bd);border-radius:15px;padding:16px;margin-bottom:10px;opacity:0;animation:cardIn 0.5s ease forwards;transition:all 0.3s;}
.ai:hover{background:rgba(249,115,22,0.04);border-color:rgba(249,115,22,0.28);}
.ai-top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.ai-ic{width:42px;height:42px;border-radius:11px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ai-title{font-size:14px;font-weight:600;color:#fff;}
.ai-meta{font-size:11px;color:var(--mt);margin-top:2px;}
.ai-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:11px;}
.as{text-align:center;background:rgba(249,115,22,0.05);border-radius:8px;padding:8px 4px;}
.as-v{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--pri);}
.as-l{font-size:9px;color:var(--mt);text-transform:uppercase;margin-top:1px;}
.ai-btns{display:flex;gap:8px;}
.btn-share{flex:1;padding:8px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn-del{padding:8px 12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:#ef4444;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.empty{text-align:center;padding:60px 20px;color:var(--mt);}
.empty-btn{margin-top:16px;padding:11px 22px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:linear-gradient(135deg,#0d1225,#131b38);border:1px solid var(--bd);border-radius:22px 22px 0 0;width:min(600px,100vw);max-height:92vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp 0.35s cubic-bezier(0.22,1,0.36,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@media(min-width:640px){.modal-bg{align-items:center;}.modal{border-radius:22px;max-width:600px;}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff;}
.modal-sub{font-size:11px;color:var(--mt);margin-top:2px;}
.modal-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--t);border-radius:7px;padding:5px 10px;font-size:13px;cursor:pointer;}
#shareMap{width:100%;height:280px;}
.modal-foot{padding:12px 20px;border-top:1px solid var(--bd);display:flex;gap:8px;flex-shrink:0;}
.btn-native{flex:1;padding:11px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-copy{flex:1;padding:11px;background:rgba(249,115,22,0.1);border:2px solid var(--pri);border-radius:10px;color:var(--pri);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
</style></head><body>
<div id="pt"></div>
<nav>
  <button class="back" onclick="go('/dashboard.html')">← Dashboard</button>
  <div class="nav-t">📚 Activity History</div>
  <button class="btn-clear" onclick="clearAll()">Clear All</button>
</nav>
<div class="page">
  <div class="summary" id="sumRow">
    <div class="sc"><div class="sc-v" id="sumActs">0</div><div class="sc-l">Activities</div></div>
    <div class="sc"><div class="sc-v" id="sumDist">0.0</div><div class="sc-l">Total km</div></div>
    <div class="sc"><div class="sc-v" id="sumHrs">0.0</div><div class="sc-l">Hours</div></div>
  </div>
  <div id="histList"></div>
</div>

<div class="modal-bg" id="shareModal">
  <div class="modal">
    <div class="modal-head">
      <div><div class="modal-title" id="shareTitle"></div><div class="modal-sub" id="shareSub"></div></div>
      <button class="modal-close" onclick="closeShare()">✕</button>
    </div>
    <div id="shareMapWrap"><div id="shareMap"></div></div>
    <div class="modal-foot">
      <button class="btn-native" onclick="doNativeShare()">📤 Share</button>
      <button class="btn-copy" id="copyBtn" onclick="doCopyStats()">📋 Copy Stats</button>
    </div>
  </div>
</div>

<script>
function initT(){const t=document.getElementById('pt');if(!t)return;t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(1);transform-origin:right;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.6s cubic-bezier(0.22,1,0.36,1)';t.style.transform='scaleX(0)';}));}
window.addEventListener('pageshow',e=>{if(e.persisted)initT();});
function go(url){const t=document.getElementById('pt');if(!t){location.href=url;return;}t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(0);transform-origin:left;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.45s cubic-bezier(0.77,0,0.18,1)';t.style.transform='scaleX(1)';setTimeout(()=>location.href=url,460);}));}
initT();
if(!localStorage.getItem('fittrack_token')) location.href='/login.html';

const IC={run:'🏃',ride:'🚴',cycle:'🚴',walk:'🚶',hike:'⛰️',swim:'🏊',workout:'💪',other:'🎯'};
let shareMapInst=null, currentEntry=null;

function getH(){try{return JSON.parse(localStorage.getItem('fittrack_activity_history')||'[]');}catch{return[];}}
function saveH(h){localStorage.setItem('fittrack_activity_history',JSON.stringify(h));}

function render(){
  const h=getH().slice().reverse();
  const d=h.reduce((s,a)=>s+parseFloat(a.distance||0),0);
  const sec=h.reduce((s,a)=>{const p=(a.duration||'00:00:00').split(':').map(Number);return s+(p[0]*3600)+(p[1]*60)+(p[2]||0);},0);
  document.getElementById('sumActs').textContent=h.length;
  document.getElementById('sumDist').textContent=d.toFixed(1);
  document.getElementById('sumHrs').textContent=(sec/3600).toFixed(1);
  const list=document.getElementById('histList');
  if(!h.length){
    list.innerHTML=`<div class="empty"><div style="font-size:44px;margin-bottom:12px">🏃</div><div style="font-size:15px;font-weight:600;color:#fff;margin-bottom:6px">No activities yet</div><div style="font-size:13px">Complete your first activity!</div><button class="empty-btn" onclick="go('/start-activity.html')">Start Activity</button></div>`;
    return;
  }
  list.innerHTML=h.map((a,i)=>`
    <div class="ai" style="animation-delay:${0.04+i*0.05}s">
      <div class="ai-top">
        <div class="ai-ic">${IC[a.type?.toLowerCase()]||'🎯'}</div>
        <div>
          <div class="ai-title">${a.title||'Activity'}</div>
          <div class="ai-meta">${a.savedAt?new Date(a.savedAt).toLocaleDateString('en',{weekday:'long',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):(a.finishedAt||'')}</div>
        </div>
      </div>
      <div class="ai-stats">
        <div class="as"><div class="as-v">${parseFloat(a.distance||0).toFixed(2)}</div><div class="as-l">km</div></div>
        <div class="as"><div class="as-v">${a.duration||'—'}</div><div class="as-l">Duration</div></div>
        <div class="as"><div class="as-v">${a.elevation||0}m</div><div class="as-l">Elev</div></div>
        <div class="as"><div class="as-v">${a.calories||Math.round(parseFloat(a.distance||0)*60)}</div><div class="as-l">kcal</div></div>
      </div>
      <div class="ai-btns">
        <button class="btn-share" onclick="openShare(${h.length-1-i})">🗺️ View & Share</button>
        <button class="btn-del" onclick="delEntry(${h.length-1-i})">🗑</button>
      </div>
    </div>`).join('');
}

function delEntry(idx){
  const h=getH();
  if(!confirm('Delete "'+h[idx]?.title+'"?'))return;
  h.splice(idx,1);saveH(h);render();
}
function clearAll(){
  if(!confirm('Clear ALL activities?'))return;
  localStorage.removeItem('fittrack_activity_history');render();
}

function openShare(idx){
  const a=getH()[idx]; currentEntry=a;
  document.getElementById('shareTitle').textContent=(a.title||'Activity')+' · '+(IC[a.type?.toLowerCase()]||'🎯');
  document.getElementById('shareSub').textContent=`${a.duration} · ${parseFloat(a.distance||0).toFixed(2)} km · ${a.elevation||0}m elev`;
  document.getElementById('shareModal').classList.add('open');
  // Reset map container
  document.getElementById('shareMap').innerHTML='';
  // Init map after paint so container has dimensions
  requestAnimationFrame(()=>setTimeout(()=>{
    if(shareMapInst){try{shareMapInst.remove();}catch(e){}shareMapInst=null;}
    shareMapInst=L.map('shareMap',{zoomControl:true,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(shareMapInst);
    const pts=a.gpsPoints||[];
    if(pts.length>=2){
      const ll=pts.map(p=>[p.latitude,p.longitude]);
      L.polyline(ll,{color:'#F97316',weight:5,opacity:0.95}).addTo(shareMapInst);
      L.circleMarker(ll[0],{radius:7,fillColor:'#22c55e',color:'#fff',weight:2,fillOpacity:1}).addTo(shareMapInst);
      L.circleMarker(ll[ll.length-1],{radius:7,fillColor:'#ef4444',color:'#fff',weight:2,fillOpacity:1}).addTo(shareMapInst);
      shareMapInst.fitBounds(L.polyline(ll).getBounds(),{padding:[30,30]});
    } else {
      shareMapInst.setView([20.5937,78.9629],4);
    }
    shareMapInst.invalidateSize();
  },150));
}

function closeShare(){
  document.getElementById('shareModal').classList.remove('open');
  if(shareMapInst){try{shareMapInst.remove();}catch(e){}shareMapInst=null;}
}
document.getElementById('shareModal').addEventListener('click',e=>{if(e.target===document.getElementById('shareModal'))closeShare();});

function buildShareText(){
  if(!currentEntry)return'';
  const a=currentEntry;
  return`🏃 FitTrack Activity\n${a.title} (${a.type})\n📍 ${parseFloat(a.distance||0).toFixed(2)} km  ⏱ ${a.duration}  ⛰ ${a.elevation||0}m  🔥 ${a.calories||'—'} kcal\n${new Date(a.savedAt||'').toLocaleDateString('en',{weekday:'long',month:'short',day:'numeric'})}`;
}
function doNativeShare(){
  const text=buildShareText();
  if(navigator.share){navigator.share({title:'FitTrack — '+(currentEntry?.title||'Activity'),text}).catch(()=>doCopyStats());}
  else doCopyStats();
}
function doCopyStats(){
  const btn=document.getElementById('copyBtn');
  navigator.clipboard.writeText(buildShareText()).then(()=>{
    btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy Stats',2000);
  });
}

render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script></body></html>
