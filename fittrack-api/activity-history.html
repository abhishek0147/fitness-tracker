<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitTrack – Activity History</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--pri:#F97316;--pri2:#FB923C;--bg:#060914;--s:rgba(255,255,255,0.04);--bd:rgba(249,115,22,0.18);--t:#e2e8f0;--mt:rgba(226,232,240,0.38);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--t);overflow-x:hidden;}
nav{position:sticky;top:0;z-index:50;background:rgba(6,9,20,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 32px;height:58px;display:flex;align-items:center;gap:14px;}
.back{display:flex;align-items:center;gap:7px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);color:var(--pri);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:600;transition:all 0.3s;}
.back:hover{background:rgba(249,115,22,0.15);}
.nav-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1;}
.page{max-width:760px;margin:0 auto;padding:28px 24px 80px;}
@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px;animation:cardIn 0.5s 0.04s ease both;}
.sc{background:var(--s);border:1px solid var(--bd);border-radius:14px;padding:16px;text-align:center;}
.sc-v{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sc-l{font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.ai{background:var(--s);border:1px solid var(--bd);border-radius:16px;padding:18px 20px;margin-bottom:10px;opacity:0;animation:cardIn 0.5s ease forwards;transition:all 0.3s;}
.ai:hover{background:rgba(249,115,22,0.04);border-color:rgba(249,115,22,0.28);}
.ai-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.ai-ic{width:44px;height:44px;border-radius:12px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.ai-title{font-size:15px;font-weight:600;color:#fff;}
.ai-meta{font-size:12px;color:var(--mt);margin-top:2px;}
.ai-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.as{text-align:center;background:rgba(249,115,22,0.05);border-radius:9px;padding:9px 4px;}
.as-v{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--pri);}
.as-l{font-size:10px;color:var(--mt);text-transform:uppercase;margin-top:2px;}
.ai-btns{display:flex;gap:8px;}
.btn-share{flex:1;padding:9px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:9px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;transition:all 0.3s;}
.btn-share:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(249,115,22,0.4);}
.btn-del{padding:9px 13px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:9px;color:#ef4444;font-size:13px;transition:all 0.3s;}
.btn-del:hover{background:rgba(239,68,68,0.15);}
.empty{text-align:center;padding:70px 20px;color:var(--mt);}
.empty-btn{margin-top:18px;padding:12px 24px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:11px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
.modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:linear-gradient(135deg,#0d1225,#131b38);border:1px solid var(--bd);border-radius:22px;width:min(600px,94vw);animation:cardIn 0.35s cubic-bezier(0.22,1,0.36,1);overflow:hidden;}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff;}
.modal-sub{font-size:12px;color:var(--mt);margin-top:3px;}
.modal-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--t);border-radius:8px;padding:6px 11px;font-size:13px;}
#shareMap{width:100%;height:300px;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:10px;}
.btn-native{flex:1;padding:12px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:11px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;transition:all 0.3s;}
.btn-native:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,0.45);}
.btn-copy{flex:1;padding:12px;background:rgba(249,115,22,0.1);border:2px solid var(--pri);border-radius:11px;color:var(--pri);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;transition:all 0.3s;}
.btn-copy:hover{background:rgba(249,115,22,0.18);}
</style></head><body>
<div id="pt"></div>
<nav>
  <button class="back" onclick="go('/dashboard.html')">← Dashboard</button>
  <div class="nav-t">📚 Activity History</div>
  <button onclick="clearAll()" style="padding:7px 12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#ef4444;border-radius:8px;font-size:13px;">Clear All</button>
</nav>
<div class="page">
  <div class="summary" id="sumRow">
    <div class="sc"><div class="sc-v" id="sumActs">0</div><div class="sc-l">Activities</div></div>
    <div class="sc"><div class="sc-v" id="sumDist">0.0</div><div class="sc-l">Total km</div></div>
    <div class="sc"><div class="sc-v" id="sumHrs">0.0</div><div class="sc-l">Hours</div></div>
  </div>
  <div id="histList"></div>
</div>
<div class="modal-bg" id="shareModal">
  <div class="modal">
    <div class="modal-head">
      <div><div class="modal-title" id="shareTitle"></div><div class="modal-sub" id="shareSub"></div></div>
      <button class="modal-close" onclick="closeShare()">✕</button>
    </div>
    <div id="shareMapWrap"><div id="shareMap"></div></div>
    <div class="modal-foot">
      <button class="btn-native" onclick="doNativeShare()">📤 Share</button>
      <button class="btn-copy" onclick="doCopyStats()">📋 Copy Stats</button>
    </div>
  </div>
</div>
<script>
function initT(){const t=document.getElementById('pt');if(!t)return;t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(1);transform-origin:right;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.6s cubic-bezier(0.22,1,0.36,1)';t.style.transform='scaleX(0)';}));}
window.addEventListener('pageshow',e=>{if(e.persisted)initT();});
function go(url){const t=document.getElementById('pt');if(!t){location.href=url;return;}t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(0);transform-origin:left;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.45s cubic-bezier(0.77,0,0.18,1)';t.style.transform='scaleX(1)';setTimeout(()=>location.href=url,460);}));}
function initCursor(){const s=document.createElement('style');s.textContent='*{cursor:none!important;}';document.head.appendChild(s);const dot=document.createElement('div'),ring=document.createElement('div');dot.style.cssText='position:fixed;width:10px;height:10px;border-radius:50%;background:#F97316;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);top:-20px;left:-20px;';ring.style.cssText='position:fixed;width:34px;height:34px;border-radius:50%;border:2px solid rgba(249,115,22,0.7);pointer-events:none;z-index:99998;transform:translate(-50%,-50%);top:-20px;left:-20px;transition:width 0.2s,height 0.2s,border-color 0.2s,opacity 0.2s;opacity:0.55;';document.body.appendChild(dot);document.body.appendChild(ring);let mx=-20,my=-20,rx=-20,ry=-20;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});(function lerp(){rx+=(mx-rx)*0.18;ry+=(my-ry)*0.18;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lerp);})();document.addEventListener('mousedown',()=>{ring.style.width='22px';ring.style.height='22px';ring.style.opacity='0.9';});document.addEventListener('mouseup',()=>{ring.style.width='34px';ring.style.height='34px';ring.style.opacity='0.55';});document.addEventListener('mouseover',e=>{if(e.target.closest('button,a,[onclick],[role=button]')){ring.style.width='44px';ring.style.height='44px';ring.style.opacity='0.7';ring.style.borderColor='#FB923C';}});document.addEventListener('mouseout',e=>{if(e.target.closest('button,a,[onclick],[role=button]')){ring.style.width='34px';ring.style.height='34px';ring.style.opacity='0.55';ring.style.borderColor='rgba(249,115,22,0.7)';}});}
initT();initCursor();
if(!localStorage.getItem('fittrack_token'))location.href='/login.html';
const IC={run:'🏃',ride:'🚴',cycle:'🚴',walk:'🚶',hike:'⛰️',swim:'🏊',workout:'💪',other:'🎯'};
let shareMapInst=null,currentEntry=null;
function getH(){try{return JSON.parse(localStorage.getItem('fittrack_activity_history')||'[]');}catch{return[];}}
function saveH(h){localStorage.setItem('fittrack_activity_history',JSON.stringify(h));}
function render(){
  const h=getH().slice().reverse();
  const d=h.reduce((s,a)=>s+parseFloat(a.distance||0),0);
  const sec=h.reduce((s,a)=>{const p=(a.duration||'00:00:00').split(':').map(Number);return s+(p[0]*3600)+(p[1]*60)+(p[2]||0);},0);
  document.getElementById('sumActs').textContent=h.length;
  document.getElementById('sumDist').textContent=d.toFixed(1);
  document.getElementById('sumHrs').textContent=(sec/3600).toFixed(1);
  const list=document.getElementById('histList');
  if(!h.length){list.innerHTML=`<div class="empty"><div style="font-size:46px;margin-bottom:14px">🏃</div><div style="font-size:16px;font-weight:600;color:#fff;margin-bottom:8px">No activities yet</div><div style="font-size:14px">Complete your first activity!</div><button class="empty-btn" onclick="go('/start-activity.html')">Start Activity</button></div>`;return;}
  list.innerHTML=h.map((a,i)=>`
    <div class="ai" style="animation-delay:${0.05+i*0.06}s">
      <div class="ai-top"><div class="ai-ic">${IC[a.type?.toLowerCase()]||'🎯'}</div>
        <div><div class="ai-title">${a.title||'Activity'}</div><div class="ai-meta">${a.savedAt?new Date(a.savedAt).toLocaleDateString('en',{weekday:'long',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):(a.finishedAt||'')}</div></div>
      </div>
      <div class="ai-stats">
        <div class="as"><div class="as-v">${parseFloat(a.distance||0).toFixed(2)}</div><div class="as-l">km</div></div>
        <div class="as"><div class="as-v">${a.duration||'—'}</div><div class="as-l">Duration</div></div>
        <div class="as"><div class="as-v">${a.elevation||0} m</div><div class="as-l">Elevation</div></div>
        <div class="as"><div class="as-v">${a.calories||Math.round(parseFloat(a.distance||0)*60)}</div><div class="as-l">kcal</div></div>
      </div>
      <div class="ai-btns">
        <button class="btn-share" onclick="openShare(${h.length-1-i})">🗺️ View Route & Share</button>
        <button class="btn-del" onclick="delEntry(${h.length-1-i})">🗑</button>
      </div>
    </div>`).join('');
}
function delEntry(idx){const h=getH();if(!confirm('Delete "'+h[idx]?.title+'"?'))return;h.splice(idx,1);saveH(h);render();}
function clearAll(){if(!confirm('Clear ALL activities?'))return;localStorage.removeItem('fittrack_activity_history');render();}
function openShare(idx){
  const a=getH()[idx];currentEntry=a;
  document.getElementById('shareTitle').textContent=(a.title||'Activity')+' · '+(IC[a.type?.toLowerCase()]||'🎯');
  document.getElementById('shareSub').textContent=`${a.duration} · ${parseFloat(a.distance||0).toFixed(2)} km · ${a.elevation||0} m elev`;
  document.getElementById('shareModal').classList.add('open');
  document.getElementById('shareMap').innerHTML='';
  setTimeout(()=>{
    if(shareMapInst){shareMapInst.remove();shareMapInst=null;}
    shareMapInst=L.map('shareMap',{zoomControl:true,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(shareMapInst);
    const pts=a.gpsPoints||[];
    if(pts.length>=2){
      const ll=pts.map(p=>[p.latitude,p.longitude]);
      L.polyline(ll,{color:'#F97316',weight:5,opacity:0.95}).addTo(shareMapInst);
      L.circleMarker(ll[0],{radius:8,fillColor:'#22c55e',color:'#fff',weight:2,fillOpacity:1}).bindTooltip('Start',{permanent:true,direction:'top'}).addTo(shareMapInst);
      L.circleMarker(ll[ll.length-1],{radius:8,fillColor:'#ef4444',color:'#fff',weight:2,fillOpacity:1}).bindTooltip('Finish',{permanent:true,direction:'top'}).addTo(shareMapInst);
      shareMapInst.fitBounds(L.polyline(ll).getBounds(),{padding:[40,40]});
    }else{shareMapInst.setView([20.5937,78.9629],4);}
    setTimeout(()=>shareMapInst.invalidateSize(),120);
  },120);
}
function closeShare(){document.getElementById('shareModal').classList.remove('open');if(shareMapInst){shareMapInst.remove();shareMapInst=null;}}
document.getElementById('shareModal').addEventListener('click',e=>{if(e.target===document.getElementById('shareModal'))closeShare();});
function buildShareText(){if(!currentEntry)return'';const a=currentEntry;return`🏃 FitTrack Activity\n${a.title} (${a.type})\n📍 ${parseFloat(a.distance||0).toFixed(2)} km  ⏱ ${a.duration}  ⛰ ${a.elevation||0} m  🔥 ${a.calories||'—'} kcal\n${new Date(a.savedAt||'').toLocaleDateString('en',{weekday:'long',month:'short',day:'numeric'})}`;}
function doNativeShare(){
  const text=buildShareText();
  if(navigator.share){navigator.share({title:'FitTrack — '+(currentEntry?.title||'Activity'),text}).catch(()=>doCopyStats());}
  else doCopyStats();
}
function doCopyStats(){const b=event.target;navigator.clipboard.writeText(buildShareText()).then(()=>{b.textContent='✅ Copied!';setTimeout(()=>b.textContent='📋 Copy Stats',2000);});}
render();
</script></body></html>
