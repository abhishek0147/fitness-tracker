<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitTrack – Start Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--pri:#F97316;--pri2:#FB923C;--acc:#38BDF8;--bg:#060914;--s:rgba(255,255,255,0.04);--bd:rgba(249,115,22,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:#e2e8f0;overflow:auto;}
nav{position:sticky;top:0;z-index:50;background:rgba(6,9,20,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 24px;height:56px;display:flex;align-items:center;gap:14px;}
.back{display:flex;align-items:center;gap:7px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);color:var(--pri);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:600;transition:all 0.3s;}
.back:hover{background:rgba(249,115,22,0.15);}
.nav-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.layout{display:grid;grid-template-columns:320px 1fr;gap:18px;padding:18px 22px 40px;min-height:calc(100vh - 56px);}
.sidebar{display:flex;flex-direction:column;gap:14px;}
.card{background:var(--s);border:1px solid var(--bd);border-radius:15px;padding:18px;}
@keyframes cardIn{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
.card{animation:cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;}
.card:nth-child(1){animation-delay:0.06s;}.card:nth-child(2){animation-delay:0.12s;}.card:nth-child(3){animation-delay:0.18s;}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--pri);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.fl label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:rgba(249,115,22,0.6);margin-bottom:6px;}
.fl select{width:100%;padding:11px 13px;background:rgba(255,255,255,0.04);border:1px solid rgba(249,115,22,0.2);border-radius:10px;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:14px;transition:all 0.3s;}
.fl select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(249,115,22,0.1);}
.fl select option{background:#0d1225;}
.status-bar{padding:11px 13px;border-radius:10px;font-size:13px;border-left:3px solid var(--pri);background:rgba(249,115,22,0.07);color:var(--pri);display:flex;align-items:center;gap:7px;}
.status-bar.go{border-left-color:#22c55e;background:rgba(34,197,94,0.07);color:#22c55e;}
.status-bar.pause{border-left-color:var(--acc);background:rgba(56,189,248,0.07);color:var(--acc);}
.status-bar.err{border-left-color:#ef4444;background:rgba(239,68,68,0.07);color:#ef4444;}
.pls{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink 1.5s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.sg{background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.12);border-radius:9px;padding:11px;}
.sg-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sg-lb{font-size:10px;color:rgba(226,232,240,0.38);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.btn-start{width:100%;padding:14px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;transition:all 0.3s;position:relative;overflow:hidden;box-shadow:0 4px 22px rgba(249,115,22,0.35);}
.btn-start::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.14),transparent);transform:translateX(-100%);transition:transform 0.5s;}
.btn-start:hover::after{transform:translateX(100%);}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(249,115,22,0.5);}
.btn-start:disabled{opacity:0.4;transform:none;box-shadow:none;}
.btn-pause{width:100%;padding:13px;background:rgba(56,189,248,0.09);border:2px solid var(--acc);border-radius:12px;color:var(--acc);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;transition:all 0.3s;}
.btn-pause:hover{background:rgba(56,189,248,0.16);}
.two-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.btn-resume{padding:12px;background:rgba(34,197,94,0.09);border:2px solid #22c55e;border-radius:11px;color:#22c55e;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;transition:all 0.3s;}
.btn-resume:hover{background:rgba(34,197,94,0.16);}
.btn-end{padding:12px;background:linear-gradient(135deg,#ef4444,#f87171);border:none;border-radius:11px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;transition:all 0.3s;box-shadow:0 4px 14px rgba(239,68,68,0.3);}
.btn-end:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(239,68,68,0.5);}
.map-wrap{border-radius:18px;overflow:hidden;border:1px solid var(--bd);animation:cardIn 0.5s 0.09s cubic-bezier(0.22,1,0.36,1) both;height:calc(100vh - 112px);min-height:400px;}
#map{width:100%;height:100%;}
.ach-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);z-index:1000;background:linear-gradient(135deg,var(--pri),var(--pri2));border-radius:16px;padding:13px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 36px rgba(249,115,22,0.5);transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);white-space:nowrap;}
.ach-toast.show{transform:translateX(-50%) translateY(0);}
.ach-icon{font-size:26px;}
.ach-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff;}
.ach-s{font-size:11px;color:rgba(255,255,255,0.75);}
@media(max-width:860px){.layout{grid-template-columns:1fr;}.map-wrap{height:52vh;}}
</style></head><body>
<div id="pt"></div>
<nav><button class="back" onclick="go('/dashboard.html')">← Dashboard</button><div class="nav-t">🏃 Start Activity</div></nav>
<div class="layout">
  <div class="sidebar">
    <div class="card">
      <div class="card-title">Activity Type</div>
      <div class="fl"><label>Choose Type</label>
        <select id="actType">
          <option value="">Select...</option><option value="run">🏃 Run</option><option value="ride">🚴 Ride</option>
          <option value="walk">🚶 Walk</option><option value="hike">⛰️ Hike</option>
          <option value="swim">🏊 Swim</option><option value="workout">💪 Workout</option><option value="other">🎯 Other</option>
        </select>
      </div>
    </div>
    <div class="status-bar" id="statusBar"><div class="pls"></div>Ready — select type and begin</div>
    <div class="card" id="statsCard" style="display:none">
      <div class="card-title">Live Stats</div>
      <div class="stat-grid">
        <div class="sg"><div class="sg-val" id="sDist">0.00</div><div class="sg-lb">Distance km</div></div>
        <div class="sg"><div class="sg-val" id="sTime">00:00:00</div><div class="sg-lb">Duration</div></div>
        <div class="sg"><div class="sg-val" id="sSpeed">0.0</div><div class="sg-lb">Speed km/h</div></div>
        <div class="sg"><div class="sg-val" id="sElev">0</div><div class="sg-lb">Elevation m</div></div>
      </div>
    </div>
    <div class="card"><div id="btnArea"><button class="btn-start" onclick="startTracking()">▶ Start Tracking</button></div></div>
  </div>
  <div class="map-wrap"><div id="map"></div></div>
</div>
<div class="ach-toast" id="achToast"><div class="ach-icon">🏆</div><div><div class="ach-t" id="achT">Achievement!</div><div class="ach-s" id="achS"></div></div></div>
<script>
function initT(){const t=document.getElementById('pt');if(!t)return;t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(1);transform-origin:right;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.6s cubic-bezier(0.22,1,0.36,1)';t.style.transform='scaleX(0)';}));}
window.addEventListener('pageshow',e=>{if(e.persisted)initT();});
function go(url){const t=document.getElementById('pt');if(!t){location.href=url;return;}t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(0);transform-origin:left;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.45s cubic-bezier(0.77,0,0.18,1)';t.style.transform='scaleX(1)';setTimeout(()=>location.href=url,460);}));}
function initCursor(){const s=document.createElement('style');s.textContent='*{cursor:none!important;}';document.head.appendChild(s);const dot=document.createElement('div'),ring=document.createElement('div');dot.style.cssText='position:fixed;width:10px;height:10px;border-radius:50%;background:#F97316;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);top:-20px;left:-20px;';ring.style.cssText='position:fixed;width:34px;height:34px;border-radius:50%;border:2px solid rgba(249,115,22,0.7);pointer-events:none;z-index:99998;transform:translate(-50%,-50%);top:-20px;left:-20px;transition:width 0.2s,height 0.2s,border-color 0.2s,opacity 0.2s;opacity:0.55;';document.body.appendChild(dot);document.body.appendChild(ring);let mx=-20,my=-20,rx=-20,ry=-20;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});(function lerp(){rx+=(mx-rx)*0.18;ry+=(my-ry)*0.18;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lerp);})();document.addEventListener('mousedown',()=>{ring.style.width='22px';ring.style.height='22px';ring.style.opacity='0.9';});document.addEventListener('mouseup',()=>{ring.style.width='34px';ring.style.height='34px';ring.style.opacity='0.55';});document.addEventListener('mouseover',e=>{if(e.target.closest('button,a,[onclick],[role=button]')){ring.style.width='44px';ring.style.height='44px';ring.style.opacity='0.7';ring.style.borderColor='#FB923C';}});document.addEventListener('mouseout',e=>{if(e.target.closest('button,a,[onclick],[role=button]')){ring.style.width='34px';ring.style.height='34px';ring.style.opacity='0.55';ring.style.borderColor='rgba(249,115,22,0.7)';}});}
initT();initCursor();
if(!localStorage.getItem('fittrack_token'))location.href='/login.html';
const map=L.map('map').setView([20.5937,78.9629],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:''}).addTo(map);
setTimeout(()=>map.invalidateSize(),200);
const curIcon=L.divIcon({html:'<div style="width:16px;height:16px;border-radius:50%;background:#F97316;border:3px solid #fff;box-shadow:0 0 12px rgba(249,115,22,0.8);"></div>',iconSize:[16,16],iconAnchor:[8,8],className:''});
const st={tracking:false,paused:false,pts:[],startTime:null,pausedTime:0,pauseStart:null,lastLoc:null,watchId:null,interval:null,polyline:null,marker:null,dist:0,elev:0};
const MS=[0.5,1,1.5,2,3,5,10];const achDone=new Set();
function setStatus(msg,type=''){const b=document.getElementById('statusBar');b.className='status-bar'+(type?' '+type:'');b.innerHTML=`<div class="pls"></div>${msg}`;}
function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function calcDist(la1,lo1,la2,lo2){const R=6371,dL=((la2-la1)*Math.PI)/180,dl=((lo2-lo1)*Math.PI)/180,a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function checkMilestone(km){MS.forEach(m=>{if(km>=m&&!achDone.has(m)){achDone.add(m);const lbl=m<1?`${m*1000}m`:`${m}km`;const toast=document.getElementById('achToast');document.getElementById('achT').textContent='Achievement Unlocked! 🎉';document.getElementById('achS').textContent='You just hit '+lbl+'! Keep going!';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),3500);}});}
function updateStats(){const el=Math.floor((Date.now()-st.startTime+st.pausedTime)/1000);document.getElementById('sDist').textContent=st.dist.toFixed(2);document.getElementById('sTime').textContent=fmt(el);document.getElementById('sSpeed').textContent=el>0?(st.dist/(el/3600)).toFixed(1):'0.0';document.getElementById('sElev').textContent=st.elev.toFixed(0);}
function showStart(){document.getElementById('btnArea').innerHTML='<button class="btn-start" onclick="startTracking()">▶ Start Tracking</button>';}
function showPause(){document.getElementById('btnArea').innerHTML='<button class="btn-pause" onclick="pauseTracking()">⏸ Pause</button>';}
function showResumeEnd(){document.getElementById('btnArea').innerHTML='<div class="two-btns"><button class="btn-resume" onclick="resumeTracking()">▶ Resume</button><button class="btn-end" onclick="endTracking()">⏹ End Activity</button></div>';}
function startTracking(){
  const type=document.getElementById('actType').value;
  if(!type){setStatus('❌ Please select an activity type','err');return;}
  if(!navigator.geolocation){setStatus('❌ Geolocation not supported','err');return;}
  Object.assign(st,{tracking:true,paused:false,startTime:Date.now(),pts:[],dist:0,elev:0,lastLoc:null,pausedTime:0});
  achDone.clear();
  document.getElementById('statsCard').style.display='block';
  document.getElementById('actType').disabled=true;
  setStatus('🟢 GPS tracking active...','go');showPause();
  st.watchId=navigator.geolocation.watchPosition(onLoc,onErr,{enableHighAccuracy:true,maximumAge:0,timeout:10000});
  st.interval=setInterval(updateStats,1000);
}
function pauseTracking(){navigator.geolocation.clearWatch(st.watchId);st.paused=true;st.pauseStart=Date.now();setStatus('⏸ Paused — GPS stopped','pause');showResumeEnd();}
function resumeTracking(){st.pausedTime+=Date.now()-st.pauseStart;st.paused=false;setStatus('🟢 Tracking resumed...','go');showPause();st.watchId=navigator.geolocation.watchPosition(onLoc,onErr,{enableHighAccuracy:true,maximumAge:0,timeout:10000});}
function endTracking(){
  navigator.geolocation.clearWatch(st.watchId);clearInterval(st.interval);
  const elapsed=Math.floor((Date.now()-st.startTime+st.pausedTime)/1000);
  sessionStorage.setItem('pending_activity',JSON.stringify({type:document.getElementById('actType').value,duration:fmt(elapsed),durationSecs:elapsed,distance:st.dist.toFixed(3),elevation:st.elev.toFixed(0),gpsPoints:st.pts,pointCount:st.pts.length}));
  go('/save-activity.html');
}
function onLoc(pos){
  const{latitude:lat,longitude:lon,altitude:alt}=pos.coords;
  const pt={latitude:lat,longitude:lon,elevation:alt||0,timestamp:new Date().toISOString()};
  if(st.lastLoc){const d=calcDist(st.lastLoc.latitude,st.lastLoc.longitude,lat,lon);st.dist+=d;if(alt&&st.lastLoc.elevation){const dz=alt-st.lastLoc.elevation;if(dz>0)st.elev+=dz;}checkMilestone(st.dist);}
  st.pts.push(pt);st.lastLoc=pt;
  const ll=[lat,lon];
  if(st.polyline)map.removeLayer(st.polyline);
  st.polyline=L.polyline(st.pts.map(p=>[p.latitude,p.longitude]),{color:'#F97316',weight:5,opacity:0.9}).addTo(map);
  if(st.marker)st.marker.setLatLng(ll);else st.marker=L.marker(ll,{icon:curIcon}).addTo(map);
  if(st.pts.length>1)map.fitBounds(st.polyline.getBounds(),{padding:[40,40]});else map.setView(ll,16);
}
function onErr(e){const m={1:'Permission denied',2:'Position unavailable',3:'GPS timeout'};setStatus('⚠️ '+(m[e.code]||'GPS error'),'err');}
</script></body></html>
