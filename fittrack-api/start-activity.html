<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitTrack – Start Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--pri:#F97316;--pri2:#FB923C;--acc:#38BDF8;--bg:#060914;--s:rgba(255,255,255,0.04);--bd:rgba(249,115,22,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:#e2e8f0;overflow:auto;}
nav{position:sticky;top:0;z-index:50;background:rgba(6,9,20,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 24px;height:56px;display:flex;align-items:center;gap:14px;}
.back{display:flex;align-items:center;gap:7px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);color:var(--pri);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:600;transition:all 0.3s;}
.nav-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
/* Network badge */
.net-badge{margin-left:auto;display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;transition:all 0.3s;}
.net-badge.online{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#22c55e;}
.net-badge.offline{background:rgba(249,115,22,0.12);border:1px solid rgba(249,115,22,0.3);color:var(--pri);}
.net-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
/* Accuracy badge */
.acc-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.acc-badge.gps{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#22c55e;}
.acc-badge.cell{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);color:var(--pri);}
.acc-badge.none{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;}
.layout{display:grid;grid-template-columns:320px 1fr;gap:18px;padding:18px 22px 40px;min-height:calc(100vh - 56px);}
.sidebar{display:flex;flex-direction:column;gap:14px;}
.card{background:var(--s);border:1px solid var(--bd);border-radius:15px;padding:18px;animation:cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;}
.card:nth-child(1){animation-delay:0.06s;}.card:nth-child(2){animation-delay:0.12s;}.card:nth-child(3){animation-delay:0.18s;}
@keyframes cardIn{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--pri);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.fl label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:rgba(249,115,22,0.6);margin-bottom:6px;}
.fl select{width:100%;padding:11px 13px;background:rgba(255,255,255,0.04);border:1px solid rgba(249,115,22,0.2);border-radius:10px;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:14px;}
.fl select:focus{outline:none;border-color:var(--pri);}
.fl select option{background:#0d1225;}
.status-bar{padding:11px 13px;border-radius:10px;font-size:13px;border-left:3px solid var(--pri);background:rgba(249,115,22,0.07);color:var(--pri);display:flex;align-items:center;gap:7px;}
.status-bar.go{border-left-color:#22c55e;background:rgba(34,197,94,0.07);color:#22c55e;}
.status-bar.pause{border-left-color:var(--acc);background:rgba(56,189,248,0.07);color:var(--acc);}
.status-bar.err{border-left-color:#ef4444;background:rgba(239,68,68,0.07);color:#ef4444;}
.pls{width:7px;height:7px;border-radius:50%;background:currentColor;animation:blink 1.5s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.sg{background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.12);border-radius:9px;padding:11px;}
.sg-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sg-lb{font-size:10px;color:rgba(226,232,240,0.38);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
/* Signal strength bar */
.signal-bar{display:flex;align-items:flex-end;gap:2px;height:14px;}
.signal-bar span{width:4px;border-radius:1px;background:rgba(255,255,255,0.15);}
.signal-bar span.on{background:var(--pri);}
.signal-bar span:nth-child(1){height:30%;}
.signal-bar span:nth-child(2){height:55%;}
.signal-bar span:nth-child(3){height:80%;}
.signal-bar span:nth-child(4){height:100%;}
.btn-start{width:100%;padding:14px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;transition:all 0.3s;position:relative;overflow:hidden;box-shadow:0 4px 22px rgba(249,115,22,0.35);}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(249,115,22,0.5);}
.btn-start:disabled{opacity:0.4;transform:none;box-shadow:none;}
.btn-pause{width:100%;padding:13px;background:rgba(56,189,248,0.09);border:2px solid var(--acc);border-radius:12px;color:var(--acc);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;transition:all 0.3s;}
.two-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.btn-resume{padding:12px;background:rgba(34,197,94,0.09);border:2px solid #22c55e;border-radius:11px;color:#22c55e;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.btn-end{padding:12px;background:linear-gradient(135deg,#ef4444,#f87171);border:none;border-radius:11px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;box-shadow:0 4px 14px rgba(239,68,68,0.3);}
.btn-end:hover{transform:translateY(-2px);}
.map-wrap{border-radius:18px;overflow:hidden;border:1px solid var(--bd);height:calc(100vh - 112px);min-height:400px;position:relative;}
#map{width:100%;height:100%;}
/* Offline map overlay */
.map-offline-msg{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(6,9,20,0.88);border:1px solid rgba(249,115,22,0.3);color:var(--pri);padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;display:none;white-space:nowrap;}
.map-offline-msg.show{display:block;}
/* Achievement toast */
.ach-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);z-index:2000;background:linear-gradient(135deg,var(--pri),var(--pri2));border-radius:16px;padding:13px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 36px rgba(249,115,22,0.5);transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);white-space:nowrap;}
.ach-toast.show{transform:translateX(-50%) translateY(0);}
.ach-icon{font-size:26px;}
.ach-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff;}
.ach-s{font-size:11px;color:rgba(255,255,255,0.75);}
@media(max-width:860px){.layout{grid-template-columns:1fr;}.map-wrap{height:52vh;}}
</style></head><body>
<div id="pt"></div>
<nav>
  <button class="back" onclick="go('/dashboard.html')">← Dashboard</button>
  <div class="nav-t">🏃 Start Activity</div>
  <div class="net-badge online" id="netBadge"><div class="net-dot"></div><span id="netLabel">Online</span></div>
  <div class="acc-badge none" id="accBadge" style="margin-left:6px">📡 <span id="accLabel">No GPS</span></div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="card">
      <div class="card-title">Activity Type</div>
      <div class="fl"><label>Choose Type</label>
        <select id="actType">
          <option value="">Select...</option>
          <option value="run">🏃 Run</option><option value="ride">🚴 Ride</option>
          <option value="walk">🚶 Walk</option><option value="hike">⛰️ Hike</option>
          <option value="swim">🏊 Swim</option><option value="workout">💪 Workout</option>
          <option value="other">🎯 Other</option>
        </select>
      </div>
    </div>

    <div class="status-bar" id="statusBar"><div class="pls"></div>Ready — select type and begin</div>

    <div class="card" id="statsCard" style="display:none">
      <div class="card-title">Live Stats</div>
      <div class="stat-grid">
        <div class="sg"><div class="sg-val" id="sDist">0.00</div><div class="sg-lb">Distance km</div></div>
        <div class="sg"><div class="sg-val" id="sTime">00:00:00</div><div class="sg-lb">Duration</div></div>
        <div class="sg"><div class="sg-val" id="sSpeed">0.0</div><div class="sg-lb">Speed km/h</div></div>
        <div class="sg"><div class="sg-val" id="sElev">0</div><div class="sg-lb">Elevation m</div></div>
      </div>
      <!-- Signal bars -->
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(249,115,22,0.1)">
        <div class="signal-bar" id="signalBar">
          <span></span><span></span><span></span><span></span>
        </div>
        <span style="font-size:11px;color:rgba(226,232,240,0.45)" id="accuracyText">Acquiring signal...</span>
      </div>
    </div>

    <div class="card"><div id="btnArea">
      <button class="btn-start" onclick="startTracking()">▶ Start Tracking</button>
    </div></div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-offline-msg" id="offlineMapMsg">📡 Offline — using cached map</div>
  </div>
</div>

<div class="ach-toast" id="achToast">
  <div class="ach-icon">🏆</div>
  <div><div class="ach-t" id="achT">Achievement!</div><div class="ach-s" id="achS"></div></div>
</div>

<script>
// ── Transition & cursor ───────────────────────────────────────
function initT(){const t=document.getElementById('pt');if(!t)return;t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(1);transform-origin:right;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.6s cubic-bezier(0.22,1,0.36,1)';t.style.transform='scaleX(0)';}));}
window.addEventListener('pageshow',e=>{if(e.persisted)initT();});
function go(url){const t=document.getElementById('pt');if(!t){location.href=url;return;}t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(0);transform-origin:left;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.45s cubic-bezier(0.77,0,0.18,1)';t.style.transform='scaleX(1)';setTimeout(()=>location.href=url,460);}));}
function initCursor(){const s=document.createElement('style');s.textContent='*{cursor:none!important;}';document.head.appendChild(s);const dot=document.createElement('div'),ring=document.createElement('div');dot.style.cssText='position:fixed;width:10px;height:10px;border-radius:50%;background:#F97316;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);top:-20px;left:-20px;';ring.style.cssText='position:fixed;width:34px;height:34px;border-radius:50%;border:2px solid rgba(249,115,22,0.7);pointer-events:none;z-index:99998;transform:translate(-50%,-50%);top:-20px;left:-20px;transition:width 0.2s,height 0.2s,opacity 0.2s;opacity:0.55;';document.body.appendChild(dot);document.body.appendChild(ring);let mx=-20,my=-20,rx=-20,ry=-20;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});(function lerp(){rx+=(mx-rx)*0.18;ry+=(my-ry)*0.18;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lerp);})();}
initT();initCursor();
if(!localStorage.getItem('fittrack_token'))location.href='/login.html';

// ── Tile cache (IndexedDB) ─────────────────────────────────────
const TILE_CACHE_NAME = 'fittrack-tiles-v1';
let tileDb = null;

function openTileDb() {
  return new Promise((resolve) => {
    if (!window.indexedDB) { resolve(null); return; }
    const req = indexedDB.open(TILE_CACHE_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('tiles');
    req.onsuccess = e => { tileDb = e.target.result; resolve(tileDb); };
    req.onerror = () => resolve(null);
  });
}

function getTile(key) {
  return new Promise(resolve => {
    if (!tileDb) { resolve(null); return; }
    const tx = tileDb.transaction('tiles', 'readonly');
    const req = tx.objectStore('tiles').get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => resolve(null);
  });
}

function putTile(key, blob) {
  if (!tileDb) return;
  const tx = tileDb.transaction('tiles', 'readwrite');
  tx.objectStore('tiles').put(blob, key);
}

// ── Custom Leaflet tile layer with offline caching ─────────────
function createCachedTileLayer() {
  return L.TileLayer.extend({
    createTile(coords, done) {
      const tile = document.createElement('img');
      tile.setAttribute('crossOrigin', '');
      const url = this.getTileUrl(coords);
      const key = `${coords.z}/${coords.x}/${coords.y}`;

      getTile(key).then(cached => {
        if (cached) {
          tile.src = URL.createObjectURL(cached);
          done(null, tile);
          updateOfflineMsg(true);
        } else {
          fetch(url)
            .then(r => r.blob())
            .then(blob => {
              putTile(key, blob);
              tile.src = URL.createObjectURL(blob);
              done(null, tile);
              updateOfflineMsg(false);
            })
            .catch(() => {
              // Fetch failed — try cache one more time
              getTile(key).then(c2 => {
                if (c2) { tile.src = URL.createObjectURL(c2); done(null, tile); updateOfflineMsg(true); }
                else { tile.src = ''; done(new Error('No tile'), tile); updateOfflineMsg(true); }
              });
            });
        }
      });
      return tile;
    }
  });
}

function updateOfflineMsg(isOffline) {
  document.getElementById('offlineMapMsg').classList.toggle('show', isOffline);
}

// ── Network status ─────────────────────────────────────────────
function updateNetStatus() {
  const online = navigator.onLine;
  const badge = document.getElementById('netBadge');
  badge.className = 'net-badge ' + (online ? 'online' : 'offline');
  document.getElementById('netLabel').textContent = online ? 'Online' : 'Offline';
  if (!online) updateOfflineMsg(true);
}
window.addEventListener('online', updateNetStatus);
window.addEventListener('offline', updateNetStatus);
updateNetStatus();

// ── Map init ───────────────────────────────────────────────────
let map, CachedLayer;
openTileDb().then(() => {
  CachedLayer = createCachedTileLayer();
  map = L.map('map', { zoomControl: true }).setView([20.5937, 78.9629], 5);
  new CachedLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '', subdomains: ['a','b','c']
  }).addTo(map);
  setTimeout(() => map.invalidateSize(), 200);
});

// Pre-cache tiles around a location at zoom levels 13-16
function preCacheTiles(lat, lng) {
  if (!navigator.onLine) return;
  const zooms = [14, 15, 16];
  zooms.forEach(z => {
    // Cache 5x5 grid around position
    const x0 = lng2tile(lng, z), y0 = lat2tile(lat, z);
    for (let dx = -2; dx <= 2; dx++) {
      for (let dy = -2; dy <= 2; dy++) {
        const x = x0 + dx, y = y0 + dy;
        const key = `${z}/${x}/${y}`;
        getTile(key).then(cached => {
          if (!cached) {
            const url = `https://a.tile.openstreetmap.org/${z}/${x}/${y}.png`;
            fetch(url).then(r => r.blob()).then(b => putTile(key, b)).catch(() => {});
          }
        });
      }
    }
  });
}

function lng2tile(lng, z) { return Math.floor((lng + 180) / 360 * Math.pow(2, z)); }
function lat2tile(lat, z) { return Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z)); }

// ── Location accuracy indicator ────────────────────────────────
function updateAccuracy(accuracy) {
  const badge = document.getElementById('accBadge');
  const label = document.getElementById('accLabel');
  const text = document.getElementById('accuracyText');
  const bars = document.querySelectorAll('.signal-bar span');

  if (accuracy < 10) {
    // Excellent GPS
    badge.className = 'acc-badge gps'; label.textContent = 'GPS ±' + Math.round(accuracy) + 'm';
    bars.forEach(b => b.classList.add('on'));
    text.textContent = '📡 GPS signal — ±' + Math.round(accuracy) + 'm';
  } else if (accuracy < 50) {
    // Good GPS
    badge.className = 'acc-badge gps'; label.textContent = 'GPS ±' + Math.round(accuracy) + 'm';
    bars[0].classList.add('on'); bars[1].classList.add('on'); bars[2].classList.add('on'); bars[3].classList.remove('on');
    text.textContent = '📡 GPS — ±' + Math.round(accuracy) + 'm';
  } else if (accuracy < 300) {
    // WiFi/mixed
    badge.className = 'acc-badge cell'; label.textContent = 'WiFi ±' + Math.round(accuracy) + 'm';
    bars[0].classList.add('on'); bars[1].classList.add('on'); bars[2].classList.remove('on'); bars[3].classList.remove('on');
    text.textContent = '📶 WiFi/GPS — ±' + Math.round(accuracy) + 'm';
  } else {
    // Cell tower
    badge.className = 'acc-badge cell'; label.textContent = 'Cell ±' + Math.round(accuracy / 1000) + 'km';
    bars[0].classList.add('on'); bars[1].classList.remove('on'); bars[2].classList.remove('on'); bars[3].classList.remove('on');
    text.textContent = '📱 Cell tower — ±' + Math.round(accuracy) + 'm';
  }
}

// ── State ──────────────────────────────────────────────────────
const st = {
  tracking:false, paused:false, pts:[], startTime:null, pausedTime:0,
  pauseStart:null, lastLoc:null, watchId:null, interval:null,
  polyline:null, marker:null, dist:0, elev:0,
  // Two watchers: high accuracy (GPS) + low accuracy (cell) fallback
  watchIdLow: null, lastHighAccTime: 0
};
const MS = [0.5,1,1.5,2,3,5,10,15,20];
const achDone = new Set();

const curIcon = L.divIcon({
  html:'<div style="width:18px;height:18px;border-radius:50%;background:#F97316;border:3px solid #fff;box-shadow:0 0 14px rgba(249,115,22,0.9);"></div>',
  iconSize:[18,18], iconAnchor:[9,9], className:''
});

// ── Helpers ────────────────────────────────────────────────────
function setStatus(msg,type=''){const b=document.getElementById('statusBar');b.className='status-bar'+(type?' '+type:'');b.innerHTML=`<div class="pls"></div>${msg}`;}
function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function calcDist(la1,lo1,la2,lo2){const R=6371,dL=((la2-la1)*Math.PI)/180,dl=((lo2-lo1)*Math.PI)/180,a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function checkMilestone(km){
  MS.forEach(m=>{
    if(km>=m&&!achDone.has(m)){
      achDone.add(m);
      const lbl=m<1?`${m*1000}m`:`${m}km`;
      const toast=document.getElementById('achToast');
      document.getElementById('achT').textContent='Achievement Unlocked! 🎉';
      document.getElementById('achS').textContent='You just hit '+lbl+'! Keep going!';
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'),3500);
    }
  });
}

function updateStats(){
  const el=Math.floor((Date.now()-st.startTime+st.pausedTime)/1000);
  document.getElementById('sDist').textContent=st.dist.toFixed(2);
  document.getElementById('sTime').textContent=fmt(el);
  document.getElementById('sSpeed').textContent=el>0?(st.dist/(el/3600)).toFixed(1):'0.0';
  document.getElementById('sElev').textContent=st.elev.toFixed(0);
  // Auto-save to localStorage every 10s in case app closes
  if(el%10===0) autoSave();
}

function autoSave(){
  if(!st.tracking||st.pts.length<1) return;
  const elapsed=Math.floor((Date.now()-st.startTime+st.pausedTime)/1000);
  sessionStorage.setItem('fittrack_live_session', JSON.stringify({
    type:document.getElementById('actType').value,
    pts:st.pts, dist:st.dist, elev:st.elev,
    startTime:st.startTime, pausedTime:st.pausedTime,
    elapsed, savedAt:Date.now()
  }));
}

function showStart(){document.getElementById('btnArea').innerHTML='<button class="btn-start" onclick="startTracking()">▶ Start Tracking</button>';}
function showPause(){document.getElementById('btnArea').innerHTML='<button class="btn-pause" onclick="pauseTracking()">⏸ Pause</button>';}
function showResumeEnd(){document.getElementById('btnArea').innerHTML='<div class="two-btns"><button class="btn-resume" onclick="resumeTracking()">▶ Resume</button><button class="btn-end" onclick="endTracking()">⏹ End Activity</button></div>';}

// ── Location handler ───────────────────────────────────────────
function onLoc(pos, isHighAccuracy) {
  const {latitude:lat, longitude:lon, altitude:alt, accuracy} = pos.coords;

  // If we got a high-accuracy fix recently, ignore low-accuracy updates
  if (!isHighAccuracy && Date.now() - st.lastHighAccTime < 8000) return;
  if (isHighAccuracy) st.lastHighAccTime = Date.now();

  updateAccuracy(accuracy);

  // Pre-cache map tiles around current position
  preCacheTiles(lat, lon);

  if (!st.tracking) return;

  const pt = {latitude:lat, longitude:lon, elevation:alt||0, timestamp:new Date().toISOString(), accuracy};
  if(st.lastLoc){
    const d=calcDist(st.lastLoc.latitude,st.lastLoc.longitude,lat,lon);
    // Only count movement if accuracy is reasonable (< 500m) and moved > 2m
    if(accuracy < 500 && d > 0.002) {
      st.dist+=d;
      if(alt&&st.lastLoc.elevation){const dz=alt-st.lastLoc.elevation;if(dz>0)st.elev+=dz;}
      checkMilestone(st.dist);
    }
  }
  st.pts.push(pt); st.lastLoc=pt;
  const ll=[lat,lon];
  if(st.polyline) map.removeLayer(st.polyline);
  st.polyline=L.polyline(st.pts.map(p=>[p.latitude,p.longitude]),{color:'#F97316',weight:5,opacity:0.9}).addTo(map);
  if(st.marker) st.marker.setLatLng(ll);
  else st.marker=L.marker(ll,{icon:curIcon}).addTo(map);
  if(st.pts.length>1) map.fitBounds(st.polyline.getBounds(),{padding:[40,40],maxZoom:17});
  else map.setView(ll,16);
}

function onErr(e){
  const m={1:'Location permission denied — please allow in browser settings',2:'Position unavailable',3:'GPS timeout'};
  setStatus('⚠️ '+(m[e.code]||'Location error'),'err');
}

// ── Tracking controls ──────────────────────────────────────────
function startWatchers() {
  // High accuracy watcher (GPS + assisted)
  st.watchId = navigator.geolocation.watchPosition(
    pos => onLoc(pos, true), onErr,
    { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
  );
  // Low accuracy watcher (cell towers + WiFi) — always on as fallback
  st.watchIdLow = navigator.geolocation.watchPosition(
    pos => onLoc(pos, false), () => {},
    { enableHighAccuracy: false, maximumAge: 5000, timeout: 30000 }
  );
}

function stopWatchers() {
  if (st.watchId !== null) { navigator.geolocation.clearWatch(st.watchId); st.watchId = null; }
  if (st.watchIdLow !== null) { navigator.geolocation.clearWatch(st.watchIdLow); st.watchIdLow = null; }
}

function startTracking(){
  const type=document.getElementById('actType').value;
  if(!type){setStatus('❌ Please select an activity type','err');return;}
  if(!navigator.geolocation){setStatus('❌ Location not supported on this device','err');return;}
  Object.assign(st,{tracking:true,paused:false,startTime:Date.now(),pts:[],dist:0,elev:0,lastLoc:null,pausedTime:0,lastHighAccTime:0});
  achDone.clear();
  document.getElementById('statsCard').style.display='block';
  document.getElementById('actType').disabled=true;
  setStatus('🟢 Tracking — GPS + Cell tower active','go');
  showPause();
  startWatchers();
  st.interval=setInterval(updateStats,1000);
}

function pauseTracking(){
  stopWatchers();
  st.paused=true; st.pauseStart=Date.now();
  setStatus('⏸ Paused','pause');
  showResumeEnd();
}

function resumeTracking(){
  st.pausedTime+=Date.now()-st.pauseStart; st.paused=false;
  setStatus('🟢 Tracking resumed','go');
  showPause();
  startWatchers();
}

function endTracking(){
  stopWatchers(); clearInterval(st.interval);
  const elapsed=Math.floor((Date.now()-st.startTime+st.pausedTime)/1000);
  sessionStorage.removeItem('fittrack_live_session');
  sessionStorage.setItem('pending_activity',JSON.stringify({
    type:document.getElementById('actType').value,
    duration:fmt(elapsed), durationSecs:elapsed,
    distance:st.dist.toFixed(3), elevation:st.elev.toFixed(0),
    gpsPoints:st.pts, pointCount:st.pts.length
  }));
  go('/save-activity.html');
}

// ── Restore crashed session ────────────────────────────────────
const saved = sessionStorage.getItem('fittrack_live_session');
if(saved){
  try {
    const s = JSON.parse(saved);
    const age = (Date.now() - s.savedAt) / 1000;
    if(age < 3600) { // Less than 1 hour old
      if(confirm(`Restore interrupted activity? (${fmt(s.elapsed)} saved ${Math.round(age/60)}min ago)`)){
        Object.assign(st, {
          tracking:false, pts:s.pts||[], dist:s.dist||0, elev:s.elev||0,
          startTime:s.startTime||Date.now(), pausedTime:s.pausedTime||0
        });
        if(s.type) document.getElementById('actType').value=s.type;
        document.getElementById('statsCard').style.display='block';
        // Draw restored route
        if(st.pts.length>1){
          setTimeout(()=>{
            st.polyline=L.polyline(st.pts.map(p=>[p.latitude,p.longitude]),{color:'#F97316',weight:5,opacity:0.9}).addTo(map);
            map.fitBounds(st.polyline.getBounds(),{padding:[40,40]});
          },500);
        }
        setStatus('↩️ Session restored — press ▶ to continue or ⏹ to end','pause');
        showResumeEnd();
      } else {
        sessionStorage.removeItem('fittrack_live_session');
      }
    }
  } catch(e){ sessionStorage.removeItem('fittrack_live_session'); }
}

// ── Wake Lock — prevent screen from sleeping during tracking ───
let wakeLock = null;
async function requestWakeLock(){
  if('wakeLock' in navigator){
    try{ wakeLock=await navigator.wakeLock.request('screen'); }catch(e){}
  }
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&st.tracking) requestWakeLock();
});
</script></body></html>
