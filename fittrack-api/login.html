<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitTrack – Login</title>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<meta name="theme-color" content="#F97316">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<style>
:root{--pri:#F97316;--pri2:#FB923C;--bg:#060914;--border:rgba(249,115,22,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}

/* FIX: overflow-x:hidden instead of overflow:hidden so page scrolls on mobile */
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;overflow-y:auto;color:#e2e8f0;padding:16px;}

.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.1;animation:drift 14s ease-in-out infinite;}
.o1{width:550px;height:550px;background:var(--pri);top:-150px;left:-150px;}
.o2{width:450px;height:450px;background:#7C3AED;bottom:-150px;right:-150px;animation-delay:-5s;}
.o3{width:280px;height:280px;background:#38BDF8;top:50%;left:65%;animation-delay:-9s;}
@keyframes drift{0%,100%{transform:translate(0,0);}33%{transform:translate(30px,-40px);}66%{transform:translate(-20px,30px);}}
.grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(249,115,22,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.035) 1px,transparent 1px);background-size:56px 56px;}
.wrap{position:relative;z-index:1;width:100%;max-width:920px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;border-radius:24px;border:1px solid var(--border);box-shadow:0 0 80px rgba(249,115,22,0.1),0 40px 80px rgba(0,0,0,0.55);animation:cardIn 0.85s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(60px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.left{background:linear-gradient(160deg,rgba(249,115,22,0.09),rgba(251,146,60,0.04));padding:64px 44px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--border);border-radius:24px 0 0 24px;position:relative;overflow:hidden;}
.left::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 70%,rgba(249,115,22,0.08),transparent 70%);}
.logo-box{width:72px;height:72px;background:linear-gradient(135deg,var(--pri),var(--pri2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:20px;box-shadow:0 0 40px rgba(249,115,22,0.45);animation:logoFloat 4s ease-in-out infinite;}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-10px) rotate(3deg);}}
.brand{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--pri),var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px;}
.tagline{color:rgba(249,115,22,0.5);font-size:13px;margin-bottom:40px;}
.feats{display:flex;flex-direction:column;gap:14px;}
.feat{display:flex;align-items:center;gap:12px;opacity:0;transform:translateX(-18px);animation:featIn 0.6s ease forwards;}
.feat:nth-child(1){animation-delay:0.4s;}.feat:nth-child(2){animation-delay:0.54s;}.feat:nth-child(3){animation-delay:0.68s;}.feat:nth-child(4){animation-delay:0.82s;}
@keyframes featIn{to{opacity:1;transform:translateX(0);}}
.ficon{width:38px;height:38px;border-radius:10px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.flabel{font-size:13px;color:#cbd5e1;}
.right{background:rgba(6,9,20,0.97);padding:56px 44px;display:flex;flex-direction:column;justify-content:center;border-radius:0 24px 24px 0;}
.ftitle{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:#fff;margin-bottom:5px;opacity:0;animation:fadeUp 0.5s 0.3s ease forwards;}
.fsub{font-size:13px;color:rgba(255,255,255,0.33);margin-bottom:26px;opacity:0;animation:fadeUp 0.5s 0.4s ease forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.05);padding:4px;border-radius:12px;margin-bottom:22px;opacity:0;animation:fadeUp 0.5s 0.5s ease forwards;}
.tab{flex:1;padding:9px;background:transparent;border:none;color:rgba(255,255,255,0.4);font-family:'DM Sans',sans-serif;font-size:13px;border-radius:9px;transition:all 0.3s;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tab.on{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;font-weight:700;box-shadow:0 0 18px rgba(249,115,22,0.35);}
.field{margin-bottom:14px;opacity:0;animation:fadeUp 0.5s ease forwards;}
.field:nth-child(1){animation-delay:0.55s;}.field:nth-child(2){animation-delay:0.64s;}.field:nth-child(3){animation-delay:0.73s;}.field:nth-child(4){animation-delay:0.82s;}
.field.hide{display:none;}
.field label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:rgba(249,115,22,0.65);margin-bottom:6px;}
.field input{width:100%;padding:12px 15px;background:rgba(255,255,255,0.04);border:1px solid rgba(249,115,22,0.18);border-radius:11px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;transition:all 0.3s;-webkit-appearance:none;}
.field input::placeholder{color:rgba(255,255,255,0.16);}
.field input:focus{outline:none;border-color:var(--pri);background:rgba(249,115,22,0.06);box-shadow:0 0 0 3px rgba(249,115,22,0.1);}
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-top:6px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;opacity:0;animation:fadeUp 0.5s 0.88s ease forwards;-webkit-tap-highlight-color:transparent;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(249,115,22,0.5);}
.btn-main:disabled{opacity:0.5;transform:none;cursor:not-allowed;}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:rgba(255,255,255,0.16);font-size:11px;opacity:0;animation:fadeUp 0.5s 0.96s ease forwards;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}
.btn-google{width:100%;padding:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:11px;color:rgba(255,255,255,0.68);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.3s;opacity:0;animation:fadeUp 0.5s 1.02s ease forwards;-webkit-tap-highlight-color:transparent;}
.btn-google:hover{background:rgba(255,255,255,0.08);}
.status{margin-top:12px;padding:11px 15px;border-radius:10px;font-size:13px;display:none;}
.status.ok{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.25);display:block;}
.status.err{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25);display:block;}

/* MOBILE FIX: stack vertically, full width, proper padding */
@media(max-width:680px){
  body{align-items:flex-start;padding:16px;}
  .wrap{grid-template-columns:1fr;border-radius:20px;}
  .left{padding:32px 24px;border-right:none;border-bottom:1px solid var(--border);border-radius:20px 20px 0 0;}
  .right{padding:32px 24px;border-radius:0 0 20px 20px;}
  .brand{font-size:32px;}
  .feats{display:none;}
}
</style></head><body>
<div id="pt"></div>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="grid"></div>
<div class="wrap">
  <div class="left">
    <div class="logo-box">🏃</div>
    <div class="brand">FitTrack</div>
    <div class="tagline">Your personal fitness companion</div>
    <div class="feats">
      <div class="feat"><div class="ficon">📍</div><div class="flabel">Live GPS Tracking</div></div>
      <div class="feat"><div class="ficon">📊</div><div class="flabel">Activity Analytics</div></div>
      <div class="feat"><div class="ficon">⚔️</div><div class="flabel">Squad Competitions</div></div>
      <div class="feat"><div class="ficon">🏅</div><div class="flabel">Personal Records</div></div>
    </div>
  </div>
  <div class="right">
    <div class="ftitle" id="ftitle">Welcome back</div>
    <div class="fsub" id="fsub">Sign in to continue your fitness journey</div>
    <div class="tabs">
      <button type="button" class="tab on" id="tabLogin">Login</button>
      <button type="button" class="tab" id="tabSignup">Sign Up</button>
    </div>
    <div class="field hide" id="nameF"><label>Full Name</label><input type="text" id="name" placeholder="John Doe" autocomplete="name"/></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="your@email.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button type="button" class="btn-main" id="sbtn">Sign In</button>
    <div class="divider">or</div>
    <button type="button" class="btn-google" id="btnGoogle">🔐 Continue with Google</button>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
// Page transition
function initT(){const t=document.getElementById('pt');if(!t)return;t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(1);transform-origin:right;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.6s cubic-bezier(0.22,1,0.36,1)';t.style.transform='scaleX(0)';}));}
window.addEventListener('pageshow',e=>{if(e.persisted)initT();});
function go(url){const t=document.getElementById('pt');if(!t){location.href=url;return;}t.style.cssText='position:fixed;inset:0;z-index:9999;background:#F97316;transform:scaleX(0);transform-origin:left;pointer-events:none;will-change:transform;';requestAnimationFrame(()=>requestAnimationFrame(()=>{t.style.transition='transform 0.45s cubic-bezier(0.77,0,0.18,1)';t.style.transform='scaleX(1)';setTimeout(()=>location.href=url,460);}));}
initT();

// Redirect if already logged in
if(localStorage.getItem('fittrack_token')) go('/dashboard.html');

const apiBase = location.origin;
let isLogin = true;
let auth;

try {
  firebase.initializeApp({apiKey:"AIzaSyBTYbG7LkZOHOLsRiQTKvJvpn0arqJ6fsY",authDomain:"fitness-tracking-d01f6.firebaseapp.com",projectId:"fitness-tracking-d01f6",storageBucket:"fitness-tracking-d01f6.firebasestorage.app",messagingSenderId:"300448448622",appId:"1:300448448622:web:2ba258bed6d86ad145a67f"});
  auth = firebase.auth();
} catch(e) { console.warn('Firebase init failed:', e.message); }

function switchTab(mode) {
  isLogin = mode === 'login';
  document.getElementById('tabLogin').classList.toggle('on', isLogin);
  document.getElementById('tabSignup').classList.toggle('on', !isLogin);
  document.getElementById('nameF').classList.toggle('hide', isLogin);
  document.getElementById('ftitle').textContent = isLogin ? 'Welcome back' : 'Create account';
  document.getElementById('fsub').textContent = isLogin ? 'Sign in to continue your fitness journey' : 'Start tracking your fitness today';
  document.getElementById('sbtn').textContent = isLogin ? 'Sign In' : 'Create Account';
  document.getElementById('status').className = 'status';
  // Update autocomplete hints
  document.getElementById('password').autocomplete = isLogin ? 'current-password' : 'new-password';
}

document.getElementById('tabLogin').addEventListener('click', () => switchTab('login'));
document.getElementById('tabSignup').addEventListener('click', () => switchTab('signup'));

document.getElementById('sbtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const s = document.getElementById('status');
  const btn = document.getElementById('sbtn');
  const orig = btn.textContent;

  if (!email || !password) {
    s.className = 'status err';
    s.textContent = '❌ Please enter email and password';
    return;
  }

  s.className = 'status';
  btn.disabled = true;
  btn.textContent = isLogin ? 'Signing in...' : 'Creating account...';

  try {
    const body = isLogin
      ? { email, password }
      : { email, password, name: document.getElementById('name').value.trim() };

    if (!isLogin && !body.name) {
      s.className = 'status err';
      s.textContent = '❌ Please enter your full name';
      btn.disabled = false;
      btn.textContent = orig;
      return;
    }

    const res = await fetch(apiBase + (isLogin ? '/api/auth/login' : '/api/auth/register'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Authentication failed');
    localStorage.setItem('fittrack_token', data.token);
    localStorage.setItem('fittrack_user', JSON.stringify({ id: data.user.id, name: data.user.name, email: data.user.email }));
    s.className = 'status ok';
    s.textContent = '✅ Success! Loading dashboard...';
    setTimeout(() => go('/dashboard.html'), 900);
  } catch(err) {
    s.className = 'status err';
    s.textContent = '❌ ' + err.message;
    btn.disabled = false;
    btn.textContent = orig;
  }
});

document.getElementById('btnGoogle').addEventListener('click', async () => {
  if (!auth) {
    document.getElementById('status').className = 'status err';
    document.getElementById('status').textContent = '❌ Google sign-in not configured';
    return;
  }
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const r = await auth.signInWithPopup(provider);
    const res = await fetch(apiBase + '/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: r.user.email, name: r.user.displayName })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Google auth failed');
    localStorage.setItem('fittrack_token', data.token);
    localStorage.setItem('fittrack_user', JSON.stringify({ id: data.user.id, name: data.user.name, email: data.user.email }));
    go('/dashboard.html');
  } catch(err) {
    document.getElementById('status').className = 'status err';
    document.getElementById('status').textContent = '❌ ' + err.message;
  }
});

// Register service worker (don't clear caches here - that breaks offline)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body></html>
